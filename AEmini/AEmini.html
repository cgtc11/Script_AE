function removeComp(id){
  if(S.comps.length<=1){alert('最後のコンポは削除できません');return;}
  if(!confirm('コンポ「'+S.comps.find(function(c){return c.id===id;}).name+'」を削除しますか？\n（このコンポを参照しているクリップも削除されます）'))return;
  // Remove comp clips referencing this comp in all comps
  S.comps.forEach(function(c){c.clips=c.clips.filter(function(cl){return cl.compId!==id;});});
  S.comps=S.comps.filter(function(c){return c.id!==id;});
  if(S.activeCompId===id) S.activeCompId=S.comps[0].id;
  renderCompTabs();renderAssets();rebuildTl();pushHistory();
}
function renameComp(id){
  var c=S.comps.find(function(c){return c.id===id;});if(!c)return;
  var n=prompt('コンポ名を変更してください',c.name);if(n&&n.trim()){c.name=n.trim();pushHistory();}
  renderCompTabs();renderAssets();
}
function setActiveComp(id){
  S.activeCompId=id;S.selId=null;S.time=snapToFrame(S.time);
  var c=AC();
  if(c){
    g('inDur').value=c.dur;
    // コンポ独自サイズをグローバルに反映
    var cw=c.width||CW, ch=c.height||CH;
    CW=cw; CH=ch;
    C.width=CW; C.height=CH;
    // 解像度UIも更新
    var knownRes=['1920x1080','1280x720'];
    var resStr=CW+'x'+CH;
    g('selRes').value=knownRes.indexOf(resStr)>=0?resStr:'custom';
    g('inResW').value=CW; g('inResH').value=CH;
    setPvZoom(pvZoom);
  }
  renderCompTabs();rebuildTl();renderProps();updateTimeDisp();
}

var _tabDrag=null; // {compId, startIdx}

function renderCompTabs(){
  var bar=g('compTabs');bar.innerHTML='';
  S.comps.forEach(function(comp,idx){
    var tab=document.createElement('div');
    tab.className='comp-tab'+(comp.id===S.activeCompId?' act':'');
    tab.draggable=true;
    tab.dataset.cid=''+comp.id;

    // Drag to reorder
    tab.ondragstart=function(e){
      _tabDrag={compId:comp.id,startIdx:idx};
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('tab-drag','1');
      tab.style.opacity='0.5';
      e.stopPropagation();
    };
    tab.ondragend=function(){tab.style.opacity='1';_tabDrag=null;};
    tab.ondragover=function(e){
      // only handle tab-reorder drags, not asset drags
      if(!_tabDrag)return;
      e.preventDefault();e.stopPropagation();
      tab.style.borderLeft='2px solid #2e6ea6';
    };
    tab.ondragleave=function(){tab.style.borderLeft='';};
    tab.ondrop=function(e){
      tab.style.borderLeft='';
      if(!_tabDrag||_tabDrag.compId===comp.id)return;
      e.preventDefault();e.stopPropagation();
      var fromIdx=S.comps.findIndex(function(c){return c.id===_tabDrag.compId;});
      var toIdx=S.comps.findIndex(function(c){return c.id===comp.id;});
      if(fromIdx<0||toIdx<0)return;
      var moved=S.comps.splice(fromIdx,1)[0];
      S.comps.splice(toIdx,0,moved);
      _tabDrag=null;
      renderCompTabs();renderAssets();pushHistory();
    };

    // Name: click=switch, double-click=rename
    var nm=document.createElement('span');nm.textContent=comp.name;nm.style.pointerEvents='auto';
    nm.ondblclick=function(e){e.stopPropagation();renameComp(comp.id);};
    tab.appendChild(nm);

    // ✏ rename button
    var ed=document.createElement('span');ed.textContent='✏';ed.title='名前を変更 (ダブルクリックでも可)';
    ed.style.cssText='font-size:10px;color:#444;padding:1px 3px;border-radius:2px;cursor:pointer;';
    ed.onmouseover=function(){ed.style.color='#aaa';};ed.onmouseout=function(){ed.style.color='#444';};
    ed.onclick=function(e){e.stopPropagation();renameComp(comp.id);};
    tab.appendChild(ed);

    if(S.comps.length>1){
      var x=document.createElement('span');x.className='comp-tab-del';x.textContent='×';x.title='コンポを削除';
      x.onclick=function(e){e.stopPropagation();removeComp(comp.id);};
      tab.appendChild(x);
    }
    tab.onclick=function(e){if(e.target===tab||e.target===nm)setActiveComp(comp.id);};
    bar.appendChild(tab);
  });
  var add=document.createElement('div');add.className='comp-add';add.textContent='+';add.title='新規コンポ';
  add.onclick=addComp;bar.appendChild(add);
}

// ─── Save / Load ──────────────────────────────────────────────────────────
function buildProjectJSON(){
  return {
    version:5,projId:S.projId,fps:S.fps,pxPerSec:S.pxPerSec,
    resolution:CW+'x'+CH,timeMode:S.timeMode,
    comps:JSON.parse(JSON.stringify(S.comps)),
    activeCompId:S.activeCompId,
    folders:JSON.parse(JSON.stringify(S.folders)),
    assets:S.assets.map(function(a){
      return {id:a.id,type:a.type,name:a.name,originalName:a.originalName||a.name,
        displayName:a.displayName||a.name,duration:a.duration||0,
        seqFps:a.seqFps||null,frameCount:a.frameCount||0,folderId:a.folderId||null,
        color:a.color||null};  // solid用
    }),
    _nid:S._nid
  };
}
async function saveProject(){
  var json=JSON.stringify(buildProjectJSON(),null,2);
  if(canFSA&&window.showSaveFilePicker){
    try{var handle=await window.showSaveFilePicker({startIn:'desktop',suggestedName:'project1.json',types:[{description:'AEmini Project File',accept:{'application/json':['.json']}}]});var w=await handle.createWritable();await w.write(json);await w.close();return;}
    catch(e){if(e.name==='AbortError')return;}
  }
  var name=prompt('保存ファイル名（拡張子不要）','project1');if(!name)return;
  name=name.replace(/\.(json|tlv)$/gi,'');
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=name+'.json';a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},5000);
}
async function openProject(){
  if(!canFSA){g('fi-proj').click();return;}
  try{var hs=await window.showOpenFilePicker({startIn:'desktop',types:[{description:'TLV Project File',accept:{'application/json':['.json']}}]});var text=await(await hs[0].getFile()).text();await doLoadProject(JSON.parse(text));}
  catch(e){if(e.name!=='AbortError'){console.warn(e);g('fi-proj').click();}}
}
g('fi-proj').onchange=async function(){var f=this.files[0];if(!f)return;try{await doLoadProject(JSON.parse(await f.text()));}catch(err){alert('読み込みエラー: '+err.message);}this.value='';};

async function doLoadProject(proj){
  if((proj.version||0)<5){alert('バージョン非対応 (v5以上が必要)');return;}
  pause();
  S.fps=proj.fps||24;S.pxPerSec=proj.pxPerSec||120;S.timeMode=proj.timeMode||'frame';
  S.projId=proj.projId||('p'+Date.now());S.selId=null;S.time=0;
  g('inFps').value=S.fps;
  g('btnTimeMode').textContent=S.timeMode==='frame'?'F':'S';
  g('btnTimeMode').classList.toggle('act',S.timeMode==='frame');
  S.comps=proj.comps||[];S.activeCompId=proj.activeCompId||null;
  if(S.comps.length>0&&!S.comps.find(function(c){return c.id===S.activeCompId;})) S.activeCompId=S.comps[0].id;
  // 旧バージョンJSON（width/heightなし）はプロジェクトのresolutionで補完
  if(proj.resolution){
    var rp=proj.resolution.split('x');
    var fallW=+(rp[0]||1920), fallH=+(rp[1]||1080);
    S.comps.forEach(function(c){if(!c.width)c.width=fallW;if(!c.height)c.height=fallH;});
  }
  // アクティブコンポのサイズを反映
  var activeC=S.comps.find(function(c){return c.id===S.activeCompId;});
  if(activeC){
    CW=activeC.width||CW; CH=activeC.height||CH;
    C.width=CW; C.height=CH;
    var knownRes2=['1920x1080','1280x720'];
    var resStr2=CW+'x'+CH;
    g('selRes').value=knownRes2.indexOf(resStr2)>=0?resStr2:'custom';
    g('inResW').value=CW; g('inResH').value=CH;
    setPvZoom(pvZoom);
  } else if(proj.resolution){
    changeRes(proj.resolution);
  }
  S.folders=proj.folders||[];S._nid=proj._nid||100;
  // URLエンコードされた名前をデコード（AEエクスポート由来のJSONに対応）
  function safeDecodeAssetName(s){
    if(!s)return s;
    if(s.indexOf('%')<0)return s;
    try{return decodeURIComponent(s);}catch(e){return s;}
  }
  S.assets=(proj.assets||[]).map(function(a){
    var name=safeDecodeAssetName(a.name||'');
    var orig=safeDecodeAssetName(a.originalName||a.name||'');
    var disp=safeDecodeAssetName(a.displayName||a.name||'');
    // 平面はすぐ復元可能（色情報のみで再生成できる）
    if(a.type==='solid'&&a.color){
      return {id:a.id,type:'solid',name:name,originalName:orig,
        displayName:disp,duration:9999,color:a.color,
        solidW:0,solidH:0,frames:[],seqFps:S.fps,frameCount:1,
        folderId:a.folderId||null};
    }
    return {id:a.id,type:a.type,name:name,originalName:orig,
      displayName:disp,duration:a.duration,seqFps:a.seqFps,
      frameCount:a.frameCount,folderId:a.folderId||null,stub:true};
  });
  var c=AC();if(c)g('inDur').value=c.dur;
  renderCompTabs();renderAssets();rebuildTl();renderProps();updateTimeDisp();
  if(S.assets.filter(function(a){return a.stub;}).length>0){
    showLoad('ファイルリンクを復元中...','',0);await tick();
    var restored=0,failed=0;
    var stubAssets=S.assets.filter(function(a){return a.stub;});
    for(var i=0;i<stubAssets.length;i++){setLoad((i+1)/stubAssets.length,'ファイルリンクを復元中...',stubAssets[i].originalName||stubAssets[i].name);await tick();if(await tryRestoreAsset(stubAssets[i]))restored++;else failed++;}
    hideLoad();renderAssets();rebuildTl();
    if(failed>0)alert(restored>0?restored+'件を自動復元しました。'+failed+'件はリンクが必要です。\n素材パネルの「リンク」ボタンで再指定してください。':'ファイルリンクを復元できませんでした。\n「リンク」ボタンで各ファイルを再指定してください。');
  }
  pushHistory();
}

// ─── Layers / Tracks ──────────────────────────────────────────────────────
function addVLayer(){var c=AC();if(!c)return;c.vLayers.unshift({id:nid(),name:'V'+(c.vLayers.length+1),visible:true});rebuildTl();pushHistory();}
function addATrack(){var c=AC();if(!c)return;c.aTracks.push({id:nid(),name:'A'+(c.aTracks.length+1),visible:true});rebuildTl();pushHistory();}
function toggleLayerVisible(id,kind){
  var c=AC();if(!c)return;
  var arr=kind==='v'?c.vLayers:c.aTracks;
  var layer=arr.find(function(l){return l.id===id;});
  if(layer){layer.visible=(layer.visible===false)?true:false;}
  rebuildTl();pushHistory();
}
function removeVLayer(id){
  id=+id;var c=AC();if(!c)return;
  c.clips=c.clips.filter(function(cl){return cl.layerId!==id;});
  c.vLayers=c.vLayers.filter(function(l){return l.id!==id;});
  if(S.selId&&!findClip(S.selId)){S.selId=null;renderProps();}
  rebuildTl();pushHistory();
}
function removeATrack(id){
  id=+id;var c=AC();if(!c)return;
  c.aClips=c.aClips.filter(function(cl){return cl.trackId!==id;});
  c.aTracks=c.aTracks.filter(function(t){return t.id!==id;});
  rebuildTl();pushHistory();
}

// ─── Clip factory ─────────────────────────────────────────────────────────
function clipNatDims(clip,ownerComp){
  var fallbackW=ownerComp?(ownerComp.width||CW):CW;
  var fallbackH=ownerComp?(ownerComp.height||CH):CH;
  if(clip.compId){
    var nc=S.comps.find(function(c){return c.id===clip.compId;});
    return{w:nc?(nc.width||CW):fallbackW,h:nc?(nc.height||CH):fallbackH};
  }
  if(clip.natW&&clip.natH)return{w:clip.natW,h:clip.natH};
  var a=findAsset(clip.assetId);if(!a)return{w:fallbackW,h:fallbackH};
  if((a.type==='seq'||a.type==='img')&&a.frames&&a.frames.length)return{w:a.frames[0].width,h:a.frames[0].height};
  if(a.type==='vid'&&a.videoEl)return{w:a.videoEl.videoWidth||fallbackW,h:a.videoEl.videoHeight||fallbackH};
  return{w:fallbackW,h:fallbackH};
}
function mkVClip(assetId,layerId,tStart){
  tStart=snapToFrame(tStart);
  var a=findAsset(assetId);
  var src=a&&a.type==='img'?(10/S.fps):a&&a.type==='solid'?(10/S.fps):a?Math.min(maxSrc(a),10):5;
  var natW=CW,natH=CH;
  if(a){if((a.type==='seq'||a.type==='img')&&a.frames&&a.frames.length){natW=a.frames[0].width;natH=a.frames[0].height;}else if(a.type==='vid'&&a.videoEl){natW=a.videoEl.videoWidth||CW;natH=a.videoEl.videoHeight||CH;}}
  return {id:nid(),assetId:assetId,layerId:layerId,tStart:tStart,dur:src,trimIn:0,speed:1,fadeIn:0,fadeOut:0,x:0,y:0,scale:1,natW:natW,natH:natH};
}
function mkCompClip(compId,layerId,tStart){
  tStart=snapToFrame(tStart);
  var comp=S.comps.find(function(c){return c.id===compId;});
  var ncW=comp?(comp.width||CW):CW;
  var ncH=comp?(comp.height||CH):CH;
  return {id:nid(),compId:compId,layerId:layerId,tStart:tStart,dur:comp?comp.dur:5,trimIn:0,speed:1,fadeIn:0,fadeOut:0,x:0,y:0,scale:1,natW:ncW,natH:ncH};
}
function mkAClip(assetId,trackId,tStart){
  tStart=snapToFrame(tStart);
  var a=findAsset(assetId);
  return {id:nid(),assetId:assetId,trackId:trackId,tStart:tStart,dur:a?a.duration:5,trimIn:0,speed:1,vol:1};
}

// ─── Snap helpers ─────────────────────────────────────────────────────────
function getSnapPoints(excludeId){
  var c=AC(),pts=[S.time];if(!c)return pts;
  c.clips.forEach(function(cl){if(cl.id!==excludeId)pts.push(cl.tStart,cl.tStart+cl.dur);});
  c.aClips.forEach(function(cl){if(cl.id!==excludeId)pts.push(cl.tStart,cl.tStart+cl.dur);});
  pts.push(0,c.dur);return pts;
}
function snapNearest(t,pts){var thresh=12/S.pxPerSec,best=t,bestD=Infinity;pts.forEach(function(p){var d=Math.abs(p-t);if(d<bestD&&d<thresh){bestD=d;best=p;}});return best;}

// ─── Timeline build ───────────────────────────────────────────────────────
var _drag=null,_res=null,_rulerDown=false,_tfDrag=null;

function rebuildTl(){
  var comp=AC();if(!comp)return;
  // クリップの最大終端を計算してタイムライン幅を決定
  var maxEnd=comp.dur;
  comp.clips.forEach(function(c){var e=c.tStart+c.dur;if(e>maxEnd)maxEnd=e;});
  comp.aClips.forEach(function(c){var e=c.tStart+c.dur;if(e>maxEnd)maxEnd=e;});
  var w=Math.max(timeToX(maxEnd)+120,g('tlRight').clientWidth||600);
  var allTracks=comp.vLayers.map(function(l){return{id:l.id,name:l.name,kind:'v',visible:l.visible};})
    .concat(comp.aTracks.map(function(t){return{id:t.id,name:t.name,kind:'a',visible:t.visible};}));
  var inner=g('tlInner');
  inner.style.width=w+'px';
  inner.style.height=(RULER_H+allTracks.length*TRACK_H)+'px';
  drawRuler(w,comp.dur);
  Array.from(inner.querySelectorAll('.tl-row')).forEach(function(e){e.remove();});
  var lblRows=g('tlLblRows');lblRows.innerHTML='';

  allTracks.forEach(function(track){
    var isVisible=track.visible!==false;
    var lbl=document.createElement('div');lbl.className='lbl-row';
    lbl.innerHTML='<span class="lbl-eye '+(isVisible?'on':'off')+'" title="'+(isVisible?'クリックで非表示':'クリックで表示')+'" onclick="toggleLayerVisible('+track.id+',\''+track.kind+'\')">'+(isVisible?'●':'⊘')+'</span>'
      +'<span title="'+track.name+'" style="'+(isVisible?'':'opacity:.4')+'">'+track.name+'</span>'
      +'<span class="lbl-del" onclick="'+(track.kind==='v'?'removeVLayer':'removeATrack')+'('+track.id+')">✕</span>';
    lblRows.appendChild(lbl);

    var row=document.createElement('div');row.className='tl-row';
    row.dataset.tid=''+track.id;row.dataset.kind=track.kind;
    if(!isVisible)row.style.opacity='0.35';
    row.ondragover=function(e){e.preventDefault();row.classList.add('drop-hi');};
    row.ondragleave=function(){row.classList.remove('drop-hi');};
    row.ondrop=function(e){
      e.preventDefault();row.classList.remove('drop-hi');
      var right=g('tlRight');
      var tStart=xToTime(e.clientX-right.getBoundingClientRect().left+right.scrollLeft);
      // Comp clip drop
      var cmpId=parseInt(e.dataTransfer.getData('compId'),10);
      if(cmpId&&track.kind==='v'){
        if(cmpId===S.activeCompId){alert('自分自身をネストすることはできません');return;}
        comp.clips.push(mkCompClip(cmpId,track.id,tStart));rebuildTl();pushHistory();return;
      }
      // Asset drop
      var aid=parseInt(e.dataTransfer.getData('aid'),10);if(!aid)return;
      var asset=findAsset(aid);if(!asset||asset.stub)return;
      if(track.kind==='v'&&asset.type!=='aud'){
        comp.clips.push(mkVClip(aid,track.id,tStart));rebuildTl();pushHistory();
      } else if(track.kind==='a'&&asset.type==='aud'){
        comp.aClips.push(mkAClip(aid,track.id,tStart));rebuildTl();pushHistory();
      } else alert(track.kind==='a'?'音声素材を音声トラックへ':'動画/画像を映像レイヤーへ配置してください');
    };

    var clips=track.kind==='v'
      ?comp.clips.filter(function(c){return c.layerId===track.id;})
      :comp.aClips.filter(function(c){return c.trackId===track.id;});

    clips.forEach(function(clip){
      var asset=clip.compId?null:findAsset(clip.assetId);
      var x=timeToX(clip.tStart),cw=Math.max(timeToX(clip.dur),6);
      var isStub=asset&&asset.stub;
      var baseCol=clip.compId?'#1a1040':isStub?'#2a2a10':track.kind==='a'?'#3a1060':CLIP_COLORS[clip.id%CLIP_COLORS.length];
      var brdCol=clip.compId?'#8060d0':isStub?'#504a20':track.kind==='a'?'#7040b0':baseCol;
      var txtCol=clip.compId?'#c0a0ff':isStub?'#c0b050':track.kind==='a'?'#c090f8':'#9ac8ff';
      var hasRemap=(clip.speed||1)!==1;
      var label=clip.compId?(S.comps.find(function(c){return c.id===clip.compId;})||{name:'?'}).name:(isStub?'⚠ ':'')+(asset?asset.name:'?');

      var ce=document.createElement('div');
      ce.className='clip'+(clip.id===S.selId?' sel':'')+(hasRemap?' remap':'');
      ce.style.cssText='left:'+x+'px;width:'+cw+'px;background:'+baseCol+'cc;border-color:'+brdCol+';';
      ce.innerHTML='<div class="rsz-l"></div>'
        +'<span class="clip-lbl" style="color:'+txtCol+'">'+(clip.compId?'◆ ':'' )+(hasRemap?'⟲'+((clip.speed||1).toFixed(2))+'x ':'')+label+'</span>'
        +'<div class="rsz-r"></div>';

      ce.onmousedown=function(e){
        e.preventDefault();
        var isL=e.target.classList.contains('rsz-l'),isR=e.target.classList.contains('rsz-r');
        if(isR){S.selId=clip.id;rebuildTl();renderProps();_res={cid:clip.id,startX:e.clientX,side:'r',origDur:clip.dur,origTrimIn:clip.trimIn||0,origTStart:clip.tStart,origSpeed:clip.speed||1,isRemap:e.shiftKey};return;}
        if(isL){S.selId=clip.id;rebuildTl();renderProps();_res={cid:clip.id,startX:e.clientX,side:'l',origDur:clip.dur,origTrimIn:clip.trimIn||0,origTStart:clip.tStart,origSpeed:clip.speed||1,isRemap:e.shiftKey};return;}
        var rect=ce.getBoundingClientRect();var offX=e.clientX-rect.left;
        S.selId=clip.id;rebuildTl();renderProps();
        _drag={cid:clip.id,offX:offX,kind:track.kind,snapPts:getSnapPoints(clip.id)};
      };
      row.appendChild(ce);
    });
    inner.insertBefore(row,g('playhead'));
  });
  updatePlayhead();
  g('tlLblRows').scrollTop=g('tlRight').scrollTop;
}

function drawRuler(w,dur){
  var rc=g('rulerCanvas');rc.width=w;rc.height=RULER_H;
  var cx=rc.getContext('2d');
  cx.fillStyle='#181818';cx.fillRect(0,0,w,RULER_H);
  cx.fillStyle='#555';cx.font='10px monospace';cx.textBaseline='top';
  // 表示上の末尾は dur - 1f (0始まりなのでdur*fps-1が最終フレーム)
  var lastF=Math.round(dur*S.fps)-1;
  if(S.timeMode==='frame'){
    var pxPerF=S.pxPerSec/S.fps,fStep=1;
    if(pxPerF<2)fStep=Math.ceil(S.fps/2)*2;else if(pxPerF<4)fStep=Math.max(1,Math.round(S.fps/6));else if(pxPerF<10)fStep=5;else if(pxPerF<20)fStep=2;
    for(var f=0;f<=lastF;f+=fStep){
      var px=Math.round(timeToX(f/S.fps))+0.5;
      cx.strokeStyle='#2a2a2a';cx.lineWidth=1;cx.beginPath();cx.moveTo(px,RULER_H-7);cx.lineTo(px,RULER_H);cx.stroke();
      cx.fillText(fStep>=S.fps?Math.floor(f/S.fps)+'s':f+'f',px+2,3);
    }
  } else {
    var step=1;if(S.pxPerSec<40)step=5;if(S.pxPerSec<15)step=10;if(S.pxPerSec<8)step=30;if(S.pxPerSec>250)step=0.5;
    var lastT=lastF/S.fps;
    for(var t=0;t<=lastT+0.001;t+=step){
      var px2=Math.round(timeToX(t))+0.5;
      cx.strokeStyle='#2a2a2a';cx.lineWidth=1;cx.beginPath();cx.moveTo(px2,RULER_H-7);cx.lineTo(px2,RULER_H);cx.stroke();
      var mm=Math.floor(t/60),ss=Math.floor(t%60);
      cx.fillText(mm>0?mm+':'+ss:(t%1===0?ss+'s':t.toFixed(1)),px2+2,3);
    }
  }
}

function updatePlayhead(){
  var comp=AC();var ph=g('playhead');
  ph.style.left=timeToX(S.time)+'px';ph.style.top='0';
  ph.style.height=(RULER_H+TRACK_H*((comp?comp.vLayers.length+comp.aTracks.length:0)))+'px';
}

// ─── Mouse events ─────────────────────────────────────────────────────────
document.addEventListener('mousemove',function(e){
  if(_tfDrag){doTfDrag(e);return;}
  if(_drag){
    var clip=findClip(_drag.cid);if(!clip)return;
    var comp=AC();if(!comp)return;
    var right=g('tlRight');
    var absX=e.clientX-right.getBoundingClientRect().left+right.scrollLeft;
    var newStart=snapToFrame(xToTime(absX-_drag.offX));
    if(e.shiftKey)newStart=snapToFrame(snapNearest(newStart,_drag.snapPts));
    clip.tStart=newStart;
    document.querySelectorAll('.tl-row[data-kind="'+_drag.kind+'"]').forEach(function(row){
      var rb=row.getBoundingClientRect();
      if(e.clientY>=rb.top&&e.clientY<=rb.bottom){var tid=parseInt(row.dataset.tid,10);if(_drag.kind==='v')clip.layerId=tid;else clip.trackId=tid;}
    });
    rebuildTl();return;
  }
  if(_res){
    var clip=findClip(_res.cid);if(!clip)return;
    var a=clip.compId?null:findAsset(clip.assetId);
    var srcMax=clip.compId?9999:maxSrc(a);
    var delta=(e.clientX-_res.startX)/S.pxPerSec;
    var srcLength=_res.origDur*_res.origSpeed;
    if(_res.isRemap){
      if(_res.side==='r'){var nd=snapToFrame(Math.max(1/S.fps,_res.origDur+delta));clip.dur=nd;clip.speed=srcLength/nd;}
      else{var origTEnd=_res.origTStart+_res.origDur;var nts=snapToFrame(Math.max(0,_res.origTStart+delta));var nd2=snapToFrame(Math.max(1/S.fps,origTEnd-nts));clip.tStart=nts;clip.dur=nd2;clip.speed=srcLength/nd2;clip.trimIn=_res.origTrimIn;}
    } else {
      if(_res.side==='r'){
        var nd3=snapToFrame(Math.max(1/S.fps,_res.origDur+delta));nd3=Math.min(nd3,srcMax-clip.trimIn);
        if(e.shiftKey){var tEnd=clip.tStart+nd3;var sn=snapToFrame(snapNearest(tEnd,getSnapPoints(_res.cid)));nd3=Math.max(1/S.fps,sn-clip.tStart);}
        clip.dur=nd3;
      } else {
        var nTi=_res.origTrimIn+delta,nTs=_res.origTStart+delta,nD=_res.origDur-delta;
        if(nTi<0){nTi=0;nTs=_res.origTStart-_res.origTrimIn;nD=_res.origDur+_res.origTrimIn;}
        if(nD<1/S.fps)nD=1/S.fps;if(nTs<0)nTs=0;
        nTs=snapToFrame(nTs);nD=snapToFrame(nD);nTi=snapToFrame(nTi);
        if(e.shiftKey){var sn2=snapToFrame(snapNearest(nTs,getSnapPoints(_res.cid)));var diff=sn2-nTs;nTs=sn2;nTi+=diff;nD-=diff;nD=snapToFrame(Math.max(1/S.fps,nD));}
        clip.trimIn=Math.max(0,nTi);clip.tStart=Math.max(0,nTs);clip.dur=Math.max(1/S.fps,nD);
      }
    }
    rebuildTl();if(S.selId===_res.cid)renderProps();
  }
});
document.addEventListener('mouseup',function(){if(_drag||_res||_tfDrag)pushHistory();_drag=null;_res=null;_rulerDown=false;_tfDrag=null;});
g('rulerCanvas').addEventListener('mousedown',function(e){_rulerDown=true;doSeek(e.clientX);e.preventDefault();});
document.addEventListener('mousemove',function(e){if(_rulerDown)doSeek(e.clientX);});
function doSeek(clientX){
  var comp=AC();if(!comp)return;
  var right=g('tlRight');
  S.time=snapToFrame(Math.max(0,Math.min(comp.dur,xToTime(clientX-right.getBoundingClientRect().left+right.scrollLeft))));
  syncMedia();updatePlayhead();updateTimeDisp();
}
g('tlRight').addEventListener('scroll',function(){g('tlLblRows').scrollTop=g('tlRight').scrollTop;});

// ─── Keyboard ─────────────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  var comp=AC();
  if(e.code==='ArrowLeft'&&comp){S.time=snapToFrame(Math.max(0,S.time-1/S.fps));syncMedia();updatePlayhead();updateTimeDisp();}
  if(e.code==='ArrowRight'&&comp){S.time=snapToFrame(Math.min(comp.dur,S.time+1/S.fps));syncMedia();updatePlayhead();updateTimeDisp();}
  if((e.code==='Delete'||e.code==='Backspace')&&S.selId)deleteSelClip();
  if(e.code==='KeyD'&&e.shiftKey&&(e.ctrlKey||e.metaKey)){e.preventDefault();splitAtPlayhead();}
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.code==='KeyZ'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.shiftKey&&e.code==='KeyZ'||e.code==='KeyY')){e.preventDefault();redo();}
});

function splitAtPlayhead(){
  var comp=AC();if(!comp)return;
  pushHistory();
  var t=S.time,toAdd=[],toRemove=[];
  comp.clips.forEach(function(clip){
    var lt=t-clip.tStart;if(lt<=0.001||lt>=clip.dur-0.001)return;
    toRemove.push(clip.id);
    var c1=JSON.parse(JSON.stringify(clip));c1.id=nid();c1.dur=lt;
    var c2=JSON.parse(JSON.stringify(clip));c2.id=nid();c2.tStart=t;c2.dur=clip.dur-lt;c2.trimIn=clip.trimIn+lt*(clip.speed||1);
    toAdd.push(c1,c2);
  });
  comp.clips=comp.clips.filter(function(c){return toRemove.indexOf(c.id)<0;}).concat(toAdd);
  rebuildTl();pushHistory();
}

// ─── Canvas transform ─────────────────────────────────────────────────────
C.addEventListener('mousedown',function(e){
  if(e.button!==0||!S.selId)return;
  var clip=findClip(S.selId);if(!clip||isAClip(S.selId))return;
  var lt=S.time-clip.tStart;if(lt<0||lt>=clip.dur)return;
  var pos=screenToCanvas(e);
  var nd=clipNatDims(clip);
  var cx=CW/2+(clip.x||0),cy=CH/2+(clip.y||0);
  var hw=nd.w/2*(clip.scale||1),hh=nd.h/2*(clip.scale||1),hr=handleRadius();
  var corners=[{x:cx-hw,y:cy-hh},{x:cx+hw,y:cy-hh},{x:cx-hw,y:cy+hh},{x:cx+hw,y:cy+hh}];
  var hitCorner=corners.findIndex(function(c){return Math.abs(pos.x-c.x)<hr&&Math.abs(pos.y-c.y)<hr;});
  if(hitCorner>=0){_tfDrag={type:'scale',startX:e.clientX,startY:e.clientY,origScale:clip.scale||1,origX:clip.x||0,origY:clip.y||0,cornerX:corners[hitCorner].x,cornerY:corners[hitCorner].y,clipId:S.selId};e.preventDefault();e.stopPropagation();return;}
  if(pos.x>=cx-hw&&pos.x<=cx+hw&&pos.y>=cy-hh&&pos.y<=cy+hh){_tfDrag={type:'move',startX:e.clientX,startY:e.clientY,origX:clip.x||0,origY:clip.y||0,clipId:S.selId};e.preventDefault();e.stopPropagation();}
});
C.addEventListener('mousemove',function(e){
  if(!S.selId){C.style.cursor='default';return;}
  var clip=findClip(S.selId);if(!clip||isAClip(S.selId)){C.style.cursor='default';return;}
  var lt=S.time-clip.tStart;if(lt<0||lt>=clip.dur){C.style.cursor='default';return;}
  var pos=screenToCanvas(e);var nd=clipNatDims(clip);
  var cx=CW/2+(clip.x||0),cy=CH/2+(clip.y||0);
  var hw=nd.w/2*(clip.scale||1),hh=nd.h/2*(clip.scale||1),hr=handleRadius();
  var corners=[{x:cx-hw,y:cy-hh},{x:cx+hw,y:cy-hh},{x:cx-hw,y:cy+hh},{x:cx+hw,y:cy+hh}];
  if(corners.some(function(c){return Math.abs(pos.x-c.x)<hr&&Math.abs(pos.y-c.y)<hr;}))C.style.cursor='nwse-resize';
  else if(pos.x>=cx-hw&&pos.x<=cx+hw&&pos.y>=cy-hh&&pos.y<=cy+hh)C.style.cursor='move';
  else C.style.cursor='default';
});
function doTfDrag(e){
  if(!_tfDrag)return;var clip=findClip(_tfDrag.clipId);if(!clip)return;
  var r=C.getBoundingClientRect();var sx=CW/r.width,sy=CH/r.height;
  var dx=(e.clientX-_tfDrag.startX)*sx,dy=(e.clientY-_tfDrag.startY)*sy;
  if(_tfDrag.type==='move'){clip.x=_tfDrag.origX+dx;clip.y=_tfDrag.origY+dy;}
  else{var cx=CW/2+clip.x,cy2=CH/2+clip.y;var od=Math.sqrt(Math.pow(_tfDrag.cornerX-cx,2)+Math.pow(_tfDrag.cornerY-cy2,2));var nd=Math.sqrt(Math.pow(_tfDrag.cornerX+dx-cx,2)+Math.pow(_tfDrag.cornerY+dy-cy2,2));if(od>0)clip.scale=Math.max(0.01,_tfDrag.origScale*(nd/od));}
  var xEl=g('pX');if(xEl)xEl.textContent=Math.round(clip.x||0);
  var yEl=g('pY');if(yEl)yEl.textContent=Math.round(clip.y||0);
  var scEl=g('pSc');if(scEl)scEl.textContent=(clip.scale||1).toFixed(2);
}

// ─── Render ───────────────────────────────────────────────────────────────
var _compCanvases={};
function getOrCreateCompCanvas(compId){
  var comp=S.comps.find(function(c){return c.id===compId;});
  var cw=comp?(comp.width||CW):CW;
  var ch=comp?(comp.height||CH):CH;
  // サイズが変わったら再生成
  if(!_compCanvases[compId]||_compCanvases[compId].width!==cw||_compCanvases[compId].height!==ch){
    var oc=document.createElement('canvas');oc.width=cw;oc.height=ch;_compCanvases[compId]=oc;
  }
  return _compCanvases[compId];
}

function getFrameFromClip(clip,lt){
  if(clip.compId){
    var srcT=clip.trimIn+(lt*(clip.speed||1));
    return renderCompToCanvas(clip.compId,srcT);
  }
  var a=findAsset(clip.assetId);if(!a||a.stub)return null;
  var srcT=clip.trimIn+lt*(clip.speed||1);
  if(a.type==='solid'){
    // solidのサイズがコンポサイズと変わった場合は再生成
    if(!a.frames||!a.frames.length||a.solidW!==CW||a.solidH!==CH){
      var oc=document.createElement('canvas');oc.width=CW;oc.height=CH;
      var octx=oc.getContext('2d');octx.fillStyle=a.color||'#000';octx.fillRect(0,0,CW,CH);
      a.solidW=CW;a.solidH=CH;
      createImageBitmap(oc).then(function(bmp){a.frames=[bmp];});
      return null; // 次フレームから表示
    }
    return a.frames[0];
  }
  if(a.type==='seq'||a.type==='img'){if(!a.frames||!a.frames.length)return null;var idx=Math.max(0,Math.min(a.frames.length-1,Math.floor(srcT*(a.seqFps||S.fps))));return a.frames[idx];}
  if(a.type==='vid')return a.videoEl.readyState>=2?a.videoEl:null;
  return null;
}

function renderCompToCanvas(compId,t){
  var comp=S.comps.find(function(c){return c.id===compId;});if(!comp)return null;
  var compW=comp.width||CW, compH=comp.height||CH;
  var oc=getOrCreateCompCanvas(compId);
  var octx=oc.getContext('2d',{alpha:true});
  octx.clearRect(0,0,compW,compH);
  for(var li=comp.vLayers.length-1;li>=0;li--){
    if(comp.vLayers[li].visible===false)continue;
    var lid=comp.vLayers[li].id;
    comp.clips.filter(function(c){return c.layerId===lid;}).forEach(function(clip){
      if(clip.compId)return;
      var lt=t-clip.tStart;if(lt<0||lt>=clip.dur)return;
      var frame=getFrameFromClip(clip,lt);if(!frame)return;
      applyClipToCtx(octx,frame,clip,lt,compW,compH);
    });
  }
  return oc;
}

function calcOp(clip,lt){
  var base=clip.opacity!==undefined?clip.opacity:1;
  var op=base;
  if(clip.fadeIn>0&&lt<clip.fadeIn)op=base*(lt/clip.fadeIn);
  if(clip.fadeOut>0&&lt>clip.dur-clip.fadeOut)op=base*((clip.dur-lt)/clip.fadeOut);
  return Math.max(0,Math.min(1,op));
}

function applyClipToCtx(ctx2,frame,clip,lt,compW,compH){
  var op=calcOp(clip,lt);if(op<=0)return;
  var blend=clip.blendMode||'source-over';
  var blur=clip.blur||0;
  ctx2.save();
  ctx2.globalAlpha=op;
  ctx2.globalCompositeOperation=blend;
  ctx2.translate(compW/2+(clip.x||0),compH/2+(clip.y||0));
  ctx2.scale(clip.scale||1,clip.scale||1);
  var nd=clipNatDims(clip);
  if(blur>0){
    ctx2.filter='blur('+blur+'px)';
    ctx2.drawImage(frame,-nd.w/2,-nd.h/2,nd.w,nd.h);
    ctx2.filter='none';
  } else {
    ctx2.drawImage(frame,-nd.w/2,-nd.h/2,nd.w,nd.h);
  }
  ctx2.restore();
}

function renderFrame(){
  var comp=AC();
  ctx.clearRect(0,0,CW,CH);
  if(!comp)return;
  var compW=comp.width||CW, compH=comp.height||CH;
  for(var li=comp.vLayers.length-1;li>=0;li--){
    if(comp.vLayers[li].visible===false)continue;
    var lid=comp.vLayers[li].id;
    comp.clips.filter(function(c){return c.layerId===lid;}).forEach(function(clip){
      var lt=S.time-clip.tStart;if(lt<0||lt>=clip.dur)return;
      var frame=getFrameFromClip(clip,lt);if(!frame)return;
      applyClipToCtx(ctx,frame,clip,lt,compW,compH);
    });
  }
  if(!isExporting&&S.selId){var sel=findClip(S.selId);if(sel&&!isAClip(S.selId)){var lt2=S.time-sel.tStart;if(lt2>=0&&lt2<sel.dur)drawTransformHandles(sel);}}
}

function drawTransformHandles(clip){
  var nd=clipNatDims(clip);
  var cx=CW/2+(clip.x||0),cy=CH/2+(clip.y||0);
  var hw=nd.w/2*(clip.scale||1),hh=nd.h/2*(clip.scale||1),hr=handleRadius()*0.9;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=Math.max(1,CW/1920*1.5);ctx.setLineDash([Math.round(CW/120),Math.round(CW/240)]);
  ctx.strokeRect(cx-hw,cy-hh,hw*2,hh*2);ctx.setLineDash([]);
  [{x:cx-hw,y:cy-hh},{x:cx+hw,y:cy-hh},{x:cx-hw,y:cy+hh},{x:cx+hw,y:cy+hh}].forEach(function(c){
    ctx.beginPath();ctx.arc(c.x,c.y,hr,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    ctx.strokeStyle='#2e6ea6';ctx.lineWidth=Math.max(1.5,CW/960);ctx.stroke();
  });
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;var cs=hr*0.8;
  ctx.beginPath();ctx.moveTo(cx-cs,cy);ctx.lineTo(cx+cs,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-cs);ctx.lineTo(cx,cy+cs);ctx.stroke();
  ctx.restore();
}

// ─── Media sync ───────────────────────────────────────────────────────────
function syncMedia(){
  var comp=AC();if(!comp)return;
  var t=S.time;
  comp.clips.forEach(function(clip){
    if(clip.compId)return;
    var a=findAsset(clip.assetId);if(!a||a.type!=='vid'||a.stub)return;
    var lt=t-clip.tStart;
    if(lt>=0&&lt<clip.dur){
      var srcT=clip.trimIn+lt*(clip.speed||1);
      if(Math.abs(a.videoEl.currentTime-srcT)>0.15)a.videoEl.currentTime=srcT;
      if(S.playing){a.videoEl.playbackRate=Math.max(0.0625,Math.min(16,clip.speed||1));if(a.videoEl.paused)a.videoEl.play().catch(function(){});}
      else if(!a.videoEl.paused)a.videoEl.pause();
    } else if(!a.videoEl.paused)a.videoEl.pause();
  });
  comp.aClips.forEach(function(clip){
    var a=findAsset(clip.assetId);if(!a||a.type!=='aud'||a.stub)return;
    var lt=t-clip.tStart;
    if(lt>=0&&lt<clip.dur){
      a.audioEl.volume=Math.min(1,Math.max(0,clip.vol||1));
      var srcT=clip.trimIn+lt*(clip.speed||1);
      if(Math.abs(a.audioEl.currentTime-srcT)>0.25)a.audioEl.currentTime=srcT;
      if(S.playing&&a.audioEl.paused)a.audioEl.play().catch(function(){});
      else if(!S.playing&&!a.audioEl.paused)a.audioEl.pause();
    } else if(!a.audioEl.paused)a.audioEl.pause();
  });
}

// ─── Playback ─────────────────────────────────────────────────────────────
function updateTimeDisp(){
  var comp=AC();
  // 表示は dur*fps-1 でキャップ（0始まりなので最終フレーム番号は dur*fps-1）
  var dispT=S.time;
  if(comp){var maxDispT=(Math.round(comp.dur*S.fps)-1)/S.fps;if(dispT>maxDispT)dispT=maxDispT;}
  var s=fmtTime(dispT);g('timeDisp').textContent=s;g('pvTime').textContent=s;
}
function togglePlay(){S.playing?pause():play();}
var _lastTs=null;
function play(){S.playing=true;_lastTs=null;g('btnPlay').textContent='⏸ 停止';syncMedia();}
function pause(){S.playing=false;g('btnPlay').textContent='▶ 再生';syncMedia();}
function stopAll(){pause();S.time=0;syncMedia();updatePlayhead();updateTimeDisp();}

;(function loop(ts){
  if(S.playing){
    var comp=AC();
    if(_lastTs!==null){S.time+=(ts-_lastTs)/1000;if(comp&&S.time>=comp.dur){S.time=comp.dur;pause();}}
    _lastTs=ts;syncMedia();updatePlayhead();updateTimeDisp();
    var right=g('tlRight'),px=timeToX(S.time)-right.scrollLeft;
    if(px>right.clientWidth*0.7||px<0)right.scrollLeft=Math.max(0,timeToX(S.time)-right.clientWidth*0.3);
  } else {_lastTs=null;}
  renderFrame();
  requestAnimationFrame(loop);
})();

// ─── Properties panel ─────────────────────────────────────────────────────
function renderProps(){
  var pi=g('propsInner');
  if(!S.selId){pi.innerHTML='<div id="noSel">クリップを選択するか<br>素材をタイムラインへ<br>ドロップしてください</div>';return;}
  var clip=findClip(S.selId);if(!clip){pi.innerHTML='<div id="noSel">選択なし</div>';return;}
  var isA=isAClip(S.selId);
  var a=clip.compId?null:findAsset(clip.assetId);
  var aDur=clip.compId?clip.dur:maxSrc(a);
  var c=AC();var compDur=c?c.dur:60;
  var fs=+(1/S.fps).toFixed(6);

  function mkRow(label,id,min,max,step,val,code){
    var dec=step<0.1?2:step<1?1:0;
    return '<div class="pr"><div class="pl">'+label+' <span id="'+id+'">'+val.toFixed(dec)+'</span></div>'
      +'<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" oninput="'+code+'" onchange="pushHistory()"></div>';
  }
  function mkTimeRow(label,id,min,max,val,code){
    return '<div class="pr"><div class="pl">'+label+' <span id="'+id+'">'+fmtTime(val)+'</span></div>'
      +'<input type="range" min="'+min+'" max="'+max+'" step="'+fs+'" value="'+val+'" oninput="'+code+'" onchange="pushHistory()"></div>';
  }

  if(isA){
    pi.innerHTML='<div class="ps">配置</div>'
      +mkTimeRow('開始','pTS',0,compDur,clip.tStart,"setProp('tStart',+this.value);g('pTS').textContent=fmtTime(+this.value);rebuildTl();")
      +mkTimeRow('長さ','pD',fs,Math.max(aDur,30),clip.dur,"setProp('dur',+this.value);g('pD').textContent=fmtTime(+this.value);rebuildTl();")
      +'<div class="ps">音量</div>'
      +mkRow('音量','pV',0,1,0.01,clip.vol||1,"setProp('vol',+this.value);g('pV').textContent=(+this.value).toFixed(2);")
      +'<button class="btn sm red" style="margin-top:10px" onclick="deleteSelClip()">クリップ削除</button>';
    return;
  }

  var maxFade=snapToFrame(Math.max(fs,clip.dur*0.95));
  var compRefNote=clip.compId?'<p style="font-size:11px;color:#a080f0;margin-bottom:6px">◆ ネストされたコンポ</p>':'';
  var solidSection='';
  if(a&&a.type==='solid'){
    solidSection='<div class="ps">平面の色</div>'
      +'<div class="pr" style="display:flex;align-items:center;gap:8px;">'
      +'<input type="color" id="pSolidColor" value="'+(a.color||'#000000')+'" oninput="changeSolidColor(\''+a.id+'\',this.value)" onchange="pushHistory()" style="width:44px;height:28px;border:1px solid #333;background:#111;cursor:pointer;border-radius:4px;padding:1px;">'
      +'<span id="pSolidColorHex" style="font-family:monospace;font-size:11px;color:#aaa;">'+(a.color||'#000000')+'</span>'
      +'</div>';
  }
  // 合成モードの選択肢
  var blendModes=[
    ['source-over','通常'],['screen','スクリーン'],['lighter','加算'],
    ['multiply','乗算'],['overlay','オーバーレイ'],['difference','反転（差分）']
  ];
  var blendSel='<div class="ps">合成モード</div><div class="pr"><select style="width:100%;background:#111;border:1px solid #2e2e2e;color:#ddd;border-radius:4px;padding:4px 6px;font-size:12px;" onchange="setProp(\'blendMode\',this.value);pushHistory()">';
  var curBlend=clip.blendMode||'source-over';
  blendModes.forEach(function(m){blendSel+='<option value="'+m[0]+'"'+(curBlend===m[0]?' selected':'')+'>'+m[1]+'</option>';});
  blendSel+='</select></div>';

  pi.innerHTML=compRefNote+'<div class="ps">配置</div>'
    +mkTimeRow('開始','pTS',0,compDur,clip.tStart,"setProp('tStart',+this.value);g('pTS').textContent=fmtTime(+this.value);rebuildTl();")
    +mkTimeRow('長さ','pD',fs,Math.max(aDur,30),clip.dur,"setProp('dur',+this.value);g('pD').textContent=fmtTime(+this.value);rebuildTl();")
    +(clip.compId?'':mkTimeRow('素材オフセット','pTI',0,Math.max(0,aDur-fs),clip.trimIn||0,"setProp('trimIn',+this.value);g('pTI').textContent=fmtTime(+this.value);rebuildTl();"))
    +solidSection
    +'<div class="ps">透明度 / 合成</div>'
    +mkRow('透明度','pOp',0,1,0.01,clip.opacity!==undefined?clip.opacity:1,"setProp('opacity',+this.value);g('pOp').textContent=(+this.value).toFixed(2);")
    +blendSel
    +'<div class="ps">エフェクト</div>'
    +mkRow('ガウスぼかし','pBlur',0,100,1,clip.blur||0,"setProp('blur',+this.value);g('pBlur').textContent=(+this.value).toFixed(0);")
    +'<div class="ps">タイムリマップ</div>'
    +mkRow('スピード','pSpd',0.1,10,0.05,clip.speed||1,"setProp('speed',+this.value);g('pSpd').textContent=(+this.value).toFixed(2);rebuildTl();")
    +'<div class="ps">フェード</div>'
    +'<p style="font-size:11px;color:#555;line-height:1.5;margin-bottom:6px">重複部分でINとOUTを設定するとクロスフェード</p>'
    +mkTimeRow('フェードイン','pFI',0,maxFade,clip.fadeIn,"setProp('fadeIn',+this.value);g('pFI').textContent=fmtTime(+this.value);")
    +mkTimeRow('フェードアウト','pFO',0,maxFade,clip.fadeOut,"setProp('fadeOut',+this.value);g('pFO').textContent=fmtTime(+this.value);")
    +'<div class="ps">位置 <span style="font-size:10px;color:#444">(プレビューでドラッグ可)</span></div>'
    +'<div class="pr"><div class="pl">X <span id="pX">'+Math.round(clip.x||0)+'</span></div></div>'
    +'<div class="pr"><div class="pl">Y <span id="pY">'+Math.round(clip.y||0)+'</span></div></div>'
    +'<div class="pr"><div class="pl">スケール <span id="pSc">'+((clip.scale||1).toFixed(2))+'</span></div></div>'
    +(function(){var nd=clipNatDims(clip);var sc=clip.scale||1;return '<div class="pr"><div class="pl" style="color:#555">実サイズ <span style="color:#888;font-family:monospace;font-size:10px">'+Math.round(nd.w*sc)+'×'+Math.round(nd.h*sc)+'px</span></div></div>';})()
    +'<button class="btn sm" style="margin-bottom:4px" onclick="resetTransform()">トランスフォームをリセット</button>'
    +'<button class="btn sm red" style="margin-top:6px" onclick="deleteSelClip()">クリップ削除</button>';
}
function resetTransform(){var clip=findClip(S.selId);if(!clip)return;pushHistory();clip.x=0;clip.y=0;clip.scale=1;renderProps();}
function changeSolidColor(assetId,color){
  var a=findAsset(+assetId);if(!a||a.type!=='solid')return;
  a.color=color;
  // オフスクリーンキャンバスを再塗りして frames を更新
  var oc=document.createElement('canvas');oc.width=CW;oc.height=CH;
  var octx=oc.getContext('2d');octx.fillStyle=color;octx.fillRect(0,0,CW,CH);
  createImageBitmap(oc).then(function(bmp){a.frames=[bmp];a.solidW=CW;a.solidH=CH;});
  // 素材パネルのスウォッチも更新
  renderAssets();
  var hex=g('pSolidColorHex');if(hex)hex.textContent=color;
}
function setProp(key,val){
  var c=findClip(S.selId);if(!c)return;
  var timeKeys={tStart:1,dur:1,trimIn:1,fadeIn:1,fadeOut:1};if(timeKeys[key])val=snapToFrame(val);
  c[key]=val;
}function deleteSelClip(){
  var comp=AC();if(!comp)return;
  pushHistory();
  comp.clips=comp.clips.filter(function(c){return c.id!==S.selId;});
  comp.aClips=comp.aClips.filter(function(c){return c.id!==S.selId;});
  S.selId=null;rebuildTl();renderProps();
}

// ─── Export ───────────────────────────────────────────────────────────────
function showExpModal(){
  var comp=AC();
  g('expResLbl').textContent=CW+'×'+CH;
  g('expFpsLbl').textContent=S.fps+' fps';
  g('expInfo').textContent=typeof VideoEncoder==='undefined'
    ?'⚠ WebCodecs非対応。Chrome 94以降が必要です。'
    :'コンポ「'+(comp?comp.name:'?')+'」をH.264 MP4で書き出します。\n音声トラックがある場合はAAC音声も含まれます。\n\n総フレーム数: '+(comp?Math.ceil(comp.dur*S.fps):0)+' フレーム';
  g('expModal').classList.add('show');
}
function hideExpModal(){g('expModal').classList.remove('show');}

async function startExport(){
  if(typeof VideoEncoder==='undefined'){alert('Chrome 94以降が必要です。');return;}
  hideExpModal();
  var comp=AC();if(!comp)return;
  var bitrate=parseInt(g('expBitrate').value,10)||8000000;
  showLoad('mp4-muxerを読み込み中...','',0.02);await tick();
  if(!window.Mp4Muxer){try{await loadScript('https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.js');}catch(e){hideLoad();alert('mp4-muxer読み込み失敗: '+e.message);return;}}
  var wasPlaying=S.playing;if(wasPlaying)pause();
  var savedTime=S.time;isExporting=true;
  setLoad(0.03,'音声ミックス中...','');await tick();
  var hasAudio=comp.aClips.length>0&&S.assets.some(function(a){return a.type==='aud'&&!a.stub;});
  var mixedAudio=null;if(hasAudio){try{mixedAudio=await mixAudio(comp);}catch(e){console.warn('audio mix fail',e);}}
  var codec=await pickVideoCodec();
  if(!codec){isExporting=false;hideLoad();alert('H.264コーデックが見つかりませんでした。');S.time=savedTime;return;}
  var sr=mixedAudio?mixedAudio.sampleRate:44100,nCh=mixedAudio?mixedAudio.numberOfChannels:2;
  var doAudio=!!(mixedAudio&&typeof AudioEncoder!=='undefined');
  var muxCfg={target:new window.Mp4Muxer.ArrayBufferTarget(),video:{codec:'avc',width:CW,height:CH},fastStart:'in-memory'};
  if(doAudio)muxCfg.audio={codec:'aac',sampleRate:sr,numberOfChannels:nCh};
  var muxer=new window.Mp4Muxer.Muxer(muxCfg);
  var vEncErr=null;
  var vEnc=new VideoEncoder({output:function(c,m){muxer.addVideoChunk(c,m);},error:function(e){vEncErr=e;}});
  vEnc.configure({codec:codec,width:CW,height:CH,bitrate:bitrate,framerate:S.fps});
  if(doAudio&&mixedAudio){
    setLoad(0.05,'音声エンコード中...','');await tick();
    try{
      var aEnc=new AudioEncoder({output:function(c,m){muxer.addAudioChunk(c,m);},error:function(e){console.warn(e);}});
      aEnc.configure({codec:'mp4a.40.2',sampleRate:sr,numberOfChannels:nCh,bitrate:128000});
      var fsz=1024,total=mixedAudio.length;
      for(var off=0;off<total;off+=fsz){
        var len=Math.min(fsz,total-off);var pl=new Float32Array(len*nCh);
        for(var ch=0;ch<nCh;ch++){var cd=mixedAudio.getChannelData(ch);pl.set(cd.subarray(off,off+len),ch*len);}
        var ad=new AudioData({format:'f32-planar',sampleRate:sr,numberOfFrames:len,numberOfChannels:nCh,timestamp:Math.round(off*1e6/sr),data:pl});
        aEnc.encode(ad);ad.close();if(off%(fsz*50)===0){setLoad(0.05+0.05*(off/total));await tick();}
      }
      await aEnc.flush();
    }catch(e){console.warn('audio encode fail',e);}
  }
  var totalF=Math.ceil(comp.dur*S.fps);setLoad(0.1,'映像エンコード中...','0/'+totalF);await tick();
  for(var f=0;f<totalF;f++){
    if(vEncErr)break;
    S.time=f/S.fps;await seekAllVideos(comp,S.time);renderFrame();
    var ts=Math.round(f*1e6/S.fps),dur2=Math.round(1e6/S.fps);
    var vf=new VideoFrame(C,{timestamp:ts,duration:dur2});vEnc.encode(vf,{keyFrame:f%60===0});vf.close();
    if(f%8===0){setLoad(0.1+0.89*(f/totalF),'映像エンコード中...',(f+1)+'/'+totalF);await tick();}
  }
  if(vEncErr){isExporting=false;hideLoad();alert('エンコードエラー: '+vEncErr.message);S.time=savedTime;return;}
  setLoad(0.99,'ファイル生成中...','');await tick();
  await vEnc.flush();muxer.finalize();
  var buf=muxer.target.buffer;var blob=new Blob([buf],{type:'video/mp4'});
  var url=URL.createObjectURL(blob);var aEl=document.createElement('a');aEl.href=url;aEl.download='output.mp4';aEl.click();
  setTimeout(function(){URL.revokeObjectURL(url);},10000);
  isExporting=false;S.time=savedTime;syncMedia();updatePlayhead();updateTimeDisp();hideLoad();
  alert('書き出し完了！\nファイルサイズ: '+(buf.byteLength/1024/1024).toFixed(1)+' MB');
}

async function pickVideoCodec(){var codecs=['avc1.640034','avc1.4d0034','avc1.420034','avc1.42001f'];for(var i=0;i<codecs.length;i++){try{var r=await VideoEncoder.isConfigSupported({codec:codecs[i],width:CW,height:CH});if(r.supported)return codecs[i];}catch(e){}}return null;}
async function seekAllVideos(comp,t){
  var ps=[];
  comp.clips.forEach(function(clip){
    if(clip.compId)return;
    var a=findAsset(clip.assetId);if(!a||a.type!=='vid'||a.stub)return;
    var lt=t-clip.tStart;if(lt<0||lt>=clip.dur)return;
    var srcT=clip.trimIn+lt*(clip.speed||1);
    if(Math.abs(a.videoEl.currentTime-srcT)>0.001){
      ps.push(new Promise(function(r){var timer=setTimeout(r,400);a.videoEl.onseeked=function(){clearTimeout(timer);a.videoEl.onseeked=null;r();};a.videoEl.currentTime=srcT;}));
    }
  });
  await Promise.all(ps);
}
async function mixAudio(comp){
  var sr=44100;var offCtx=new OfflineAudioContext(2,Math.ceil(sr*comp.dur),sr);var ps=[];
  comp.aClips.forEach(function(clip){
    var a=findAsset(clip.assetId);if(!a||a.type!=='aud'||a.stub||!a.srcUrl)return;
    ps.push(fetch(a.srcUrl).then(function(r){return r.arrayBuffer();}).then(function(buf){return offCtx.decodeAudioData(buf);}).then(function(ab){
      var src=offCtx.createBufferSource();src.buffer=ab;var gain=offCtx.createGain();gain.gain.value=Math.min(1,Math.max(0,clip.vol||1));
      src.connect(gain);gain.connect(offCtx.destination);
      src.start(Math.max(0,clip.tStart),clip.trimIn||0,Math.min(clip.dur,ab.duration-(clip.trimIn||0)));
    }).catch(function(e){console.warn(e);}));
  });
  await Promise.all(ps);return await offCtx.startRendering();
}
function loadScript(src){return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=function(){rej(new Error('Script load failed: '+src));};document.head.appendChild(s);});}

// ─── Init ─────────────────────────────────────────────────────────────────
var _initComp=mkComp('Comp1',CW,CH);
S.comps.push(_initComp);
S.activeCompId=_initComp.id;
renderCompTabs();
renderAssets();
rebuildTl();
updateTimeDisp();
setPvZoom('fit');
pushHistory();
</script>
