<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AEmini</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#0d0d0d;color:#ddd}
#app{display:flex;flex-direction:column;height:100vh}
#toolbar{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#181818;border-bottom:1px solid #252525;flex-shrink:0;flex-wrap:wrap}
.btn{background:#1e1e1e;border:1px solid #303030;border-radius:5px;padding:4px 10px;color:#ccc;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;transition:background .1s}
.btn:hover{background:#272727;border-color:#444}
.btn:active{transform:scale(.97)}
.btn.grn{background:#0e3020;border-color:#206040;color:#6df0a0}.btn.grn:hover{background:#143828}
.btn.sm{padding:3px 7px;font-size:11px}
.btn.red{border-color:#4a1f1f;color:#f07070}.btn.red:hover{background:#2a1010}
.btn.act{border-color:#2e6ea6;color:#7ec8ff;background:#0e1e30}
.sep{width:1px;height:18px;background:#252525;flex-shrink:0}
.lbl{font-size:11px;color:#666;display:flex;align-items:center;gap:4px}
.lbl input[type=number]{background:#181818;border:1px solid #2e2e2e;color:#ccc;border-radius:4px;padding:2px 5px;font-size:12px;width:52px}
.lbl select{background:#181818;border:1px solid #2e2e2e;color:#ccc;border-radius:4px;padding:3px 5px;font-size:12px}
.lbl input[type=range]{accent-color:#2e6ea6;width:80px}
#timeDisp{font-family:monospace;font-size:13px;color:#5af;min-width:100px;letter-spacing:.05em}
#main{display:flex;flex:1;overflow:hidden}
/* Assets */
#assets{width:180px;flex-shrink:0;background:#141414;border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
#assets-hdr{padding:5px 8px;font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between}
#assetList{flex:1;overflow-y:auto;padding:3px}
.a-sec{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.07em;padding:4px 6px 2px;margin-top:4px}
.a-item{padding:3px 6px;border-radius:3px;margin-bottom:1px;border:1px solid transparent;display:flex;align-items:center;gap:4px;cursor:grab;user-select:none}
.a-item:hover{background:#1e1e1e;border-color:#2a2a2a}
.a-item.stub-item{opacity:.6}
.a-name{font-size:11px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.a-del{font-size:11px;color:#553333;cursor:pointer;flex-shrink:0;padding:1px 3px;border-radius:2px}
.a-del:hover{background:#2a0a0a;color:#ff6060}
.badge{font-size:9px;padding:1px 4px;border-radius:2px;flex-shrink:0;font-weight:700;letter-spacing:.03em}
.b-seq{background:#0d2a40;color:#6ab0e0}.b-vid{background:#0d2a15;color:#6ad07a}
.b-aud{background:#250d35;color:#c07ad0}.b-img{background:#252010;color:#d0b060}
.b-miss{background:#2a1800;color:#c08030}.b-comp{background:#1a1040;color:#a080f0}
.b-solid{background:#1e1e30;color:#a0a0d0}
.folder-hdr{display:flex;align-items:center;gap:4px;padding:3px 5px;cursor:pointer;border-radius:3px;border:1px solid transparent;margin-bottom:1px;user-select:none}
.folder-hdr:hover{background:#1e1e1e;border-color:#2a2a2a}
.folder-hdr.drop-hi{background:#0e2a0e;border-color:#2a602a}
.folder-toggle{font-size:10px;color:#555;width:12px;text-align:center;flex-shrink:0}
.folder-name{font-size:11px;color:#888;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.folder-del{font-size:11px;color:#553333;cursor:pointer;flex-shrink:0;padding:1px 3px;border-radius:2px}
.folder-del:hover{background:#2a0a0a;color:#ff6060}
.folder-contents{padding-left:10px}
.stub-reimport{font-size:10px;color:#c08030;cursor:pointer;border:1px solid #4a3010;border-radius:3px;padding:1px 4px;flex-shrink:0;white-space:nowrap}
.stub-reimport:hover{background:#2a1a00}
.assets-btns{padding:5px;border-top:1px solid #1e1e1e;display:flex;flex-direction:column;gap:3px}
/* Center */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#pvBar{display:flex;align-items:center;gap:4px;padding:3px 8px;background:#141414;border-bottom:1px solid #1e1e1e;flex-shrink:0}
#pvBar span{font-size:11px;color:#555;margin-right:2px}
.zoom-btn{font-size:11px;padding:2px 7px;background:#1e1e1e;border:1px solid #2e2e2e;border-radius:4px;color:#aaa;cursor:pointer}
.zoom-btn:hover{background:#272727;color:#ddd}.zoom-btn.act{border-color:#2e6ea6;color:#7ec8ff;background:#0e1e30}
#pvWrap{background:#111;display:flex;align-items:center;justify-content:center;overflow:auto;flex:0 0 auto;border-bottom:none;position:relative;padding:10px}
#pvResizer{height:5px;background:#1e1e1e;border-top:1px solid #252525;border-bottom:1px solid #252525;cursor:ns-resize;flex-shrink:0;transition:background .1s}
#pvResizer:hover{background:#2e6ea6}
#pvCanvas{display:block;cursor:crosshair;image-rendering:auto;max-width:100%;max-height:300px}
/* チェック模様の透過背景 */
#pvCheckerWrap{position:relative;display:inline-block;line-height:0}
#pvChecker{position:absolute;inset:0;background-image:linear-gradient(45deg,#3a3a3a 25%,transparent 25%),linear-gradient(-45deg,#3a3a3a 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#3a3a3a 75%),linear-gradient(-45deg,transparent 75%,#3a3a3a 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px;pointer-events:none;z-index:0}
#pvCanvas{position:relative;z-index:1}
#pvTime{position:absolute;bottom:6px;right:10px;background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-family:monospace;padding:2px 7px;border-radius:3px;pointer-events:none}
/* Comp tabs - AE style */
#tl{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#compTabs{display:flex;align-items:stretch;background:#0d0d0d;border-bottom:1px solid #252525;flex-shrink:0;overflow-x:auto;min-height:28px}
#compTabs::-webkit-scrollbar{height:3px}
.comp-tab{padding:0 10px;font-size:12px;cursor:pointer;color:#555;border-right:1px solid #1e1e1e;display:flex;align-items:center;gap:5px;white-space:nowrap;user-select:none;position:relative}
.comp-tab:hover{background:#141414;color:#aaa}
.comp-tab.act{background:#181818;color:#ddd;border-top:2px solid #2e6ea6}
.comp-tab-del{font-size:10px;color:#444;padding:1px 3px;border-radius:2px;line-height:1}
.comp-tab-del:hover{background:#2a0a0a;color:#f07070}
.comp-add{padding:0 12px;font-size:18px;cursor:pointer;color:#444;display:flex;align-items:center;flex-shrink:0}
.comp-add:hover{color:#aaa;background:#141414}
#tlHdr{padding:3px 8px;background:#141414;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:5px;flex-shrink:0}
#tlHdr span{font-size:11px;color:#444;flex:1}
#tlBody{flex:1;display:flex;overflow:hidden;min-height:0}
#tlLeft{width:75px;flex-shrink:0;background:#141414;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;overflow:hidden}
#tlLblRuler{height:24px;border-bottom:1px solid #1e1e1e;flex-shrink:0}
#tlLblRows{flex:1;overflow:hidden}
#tlRight{flex:1;overflow:auto;position:relative}
#tlInner{position:relative;min-width:100%}
#ruler{position:sticky;top:0;z-index:10;background:#181818;border-bottom:1px solid #252525;height:24px;cursor:crosshair}
#rulerCanvas{display:block}
.tl-row{height:44px;border-bottom:1px solid #1e1e1e;position:relative;flex-shrink:0}
.tl-row.drop-hi{background:rgba(46,110,166,.09)}
.lbl-row{height:44px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;padding:0 5px;gap:3px;flex-shrink:0}
.lbl-row span{font-size:11px;color:#666;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbl-del{font-size:11px;color:#662222;cursor:pointer;width:14px;text-align:center;border-radius:2px}
.lbl-del:hover{background:#2a0a0a;color:#ff6060}
.lbl-eye{cursor:pointer;width:18px;height:18px;text-align:center;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;user-select:none;font-style:normal}
.lbl-eye:hover{background:#252525}
.lbl-eye.on{color:#bbb}
.lbl-eye.off{color:#c04040}
.clip{position:absolute;top:4px;height:36px;border-radius:4px;cursor:grab;overflow:hidden;border:1px solid;display:flex;align-items:center;padding:0 8px;user-select:none;min-width:6px}
.clip.sel{outline:2px solid #55aaff;outline-offset:1px;z-index:5}
.clip.remap{background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,100,.06) 4px,rgba(255,255,100,.06) 8px) !important}
.clip-lbl{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;font-weight:500;flex:1}
.rsz-r,.rsz-l{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;background:rgba(255,255,255,.13);flex-shrink:0}
.rsz-r{right:0}.rsz-l{left:0}
.rsz-r:hover,.rsz-l:hover{background:rgba(255,255,255,.3)}
#playhead{position:absolute;top:0;width:2px;background:#ff3333;z-index:20;pointer-events:none;transform:translateX(-1px)}
#playhead::before{content:'';position:absolute;top:0;left:-4px;border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid #ff3333}
#props{width:210px;flex-shrink:0;background:#141414;border-left:1px solid #1e1e1e;overflow-y:auto;padding:8px}
#props h3{font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.ps{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin:10px 0 5px;padding-bottom:3px;border-bottom:1px solid #1e1e1e}
.pr{margin-bottom:8px}
.pl{font-size:11px;color:#666;display:flex;justify-content:space-between;margin-bottom:3px}
.pl span{color:#aaa;font-family:monospace;font-size:11px}
.pr input[type=range]{width:100%;accent-color:#2e6ea6;cursor:pointer}
#noSel{font-size:12px;color:#444;line-height:1.8}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.overlay.show{display:flex}
.overlay>p{font-size:14px;color:#aaa}
.prog-bar{width:300px;height:5px;background:#222;border-radius:3px}
.prog-fill{height:100%;background:#2e6ea6;border-radius:3px;width:0;transition:width .08s}
.prog-sub{font-size:12px;color:#555;margin-top:-8px}
#expModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:990;align-items:center;justify-content:center}
#expModal.show{display:flex}
.exp-box{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:22px 24px;width:360px}
.exp-box h2{font-size:14px;font-weight:500;margin-bottom:14px;color:#eee}
.exp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:12px}
.exp-row label{color:#888}
.exp-row select,.exp-row span{background:transparent;border:none;color:#aaa;font-size:12px}
.exp-row select{background:#111;border:1px solid #2e2e2e;color:#ccc;border-radius:4px;padding:3px 6px}
.exp-info{font-size:11px;color:#555;margin:10px 0 14px;line-height:1.7;white-space:pre-wrap}
.exp-btns{display:flex;gap:8px;justify-content:flex-end}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#383838}
</style>
</head>
<body>
<div id="app">
<div id="toolbar">
  <button class="btn" id="btnUndo" onclick="undo()" title="Ctrl+Z" style="opacity:.4" disabled>↩</button>
  <button class="btn" id="btnRedo" onclick="redo()" title="Ctrl+Y" style="opacity:.4" disabled>↪</button>
  <div class="sep"></div>
  <button class="btn" id="btnPlay" onclick="togglePlay()">▶ 再生</button>
  <button class="btn" onclick="stopAll()">■</button>
  <span id="timeDisp">0f</span>
  <div class="sep"></div>
  <label class="lbl">解像度
    <select id="selRes" onchange="onResSelect(this.value)" style="width:90px">
      <option value="1920x1080">1920×1080</option>
      <option value="1280x720">1280×720</option>
      <option value="custom">カスタム</option>
    </select>
    <input type="number" id="inResW" value="1920" min="1" max="7680" style="width:52px" oninput="applyCustomRes()">
    <span style="color:#555">×</span>
    <input type="number" id="inResH" value="1080" min="1" max="4320" style="width:52px" oninput="applyCustomRes()">
  </label>
  <label class="lbl">FPS<input type="number" id="inFps" value="24" min="1" max="120" onchange="S.fps=+this.value;rebuildTl()"></label>
  <label class="lbl">尺(秒)<input type="number" id="inDur" value="10" min="1" max="3600" onchange="setActiveDur(+this.value)"></label>
  <button class="btn act" id="btnTimeMode" onclick="toggleTimeMode()" title="フレーム/秒 切替">F</button>
  <div class="sep"></div>
  <button class="btn" onclick="saveProject()">💾 保存</button>
  <button class="btn" onclick="openProject()">📂 読込</button>
  <div class="sep"></div>
  <button class="btn grn" onclick="showExpModal()">▤ MP4書き出し</button>
  <div style="margin-left:auto">
    <label class="lbl">ズーム<input type="range" min="10" max="700" value="120" oninput="S.pxPerSec=+this.value;rebuildTl()"></label>
  </div>
</div>

<div id="main">
  <div id="assets">
    <div id="assets-hdr">素材パネル <button class="btn sm" onclick="createFolder()" title="新規フォルダ">📁+</button></div>
    <div id="assetList"></div>
    <div class="assets-btns">
      <button class="btn sm" onclick="importImgFSA()">単/連番素材を追加</button>
      <button class="btn sm" onclick="importVidFSA()">MP4動画を追加</button>
      <button class="btn sm" onclick="importAudFSA()">音楽を追加</button>
      <button class="btn sm" onclick="createSolid()">平面を作成</button>
    </div>
  </div>

  <div id="center">
    <div id="pvBar">
      <span>表示:</span>
      <button class="zoom-btn act" id="zFit" onclick="setPvZoom('fit')">Fit</button>
      <button class="zoom-btn" id="z25" onclick="setPvZoom(0.25)">25%</button>
      <button class="zoom-btn" id="z50" onclick="setPvZoom(0.5)">50%</button>
      <button class="zoom-btn" id="z100" onclick="setPvZoom(1.0)">100%</button>
      <span style="margin-left:8px;font-size:11px;color:#444">選択クリップ → プレビューでドラッグ移動/コーナーでスケール</span>
    </div>
    <div id="pvWrap">
      <div id="pvCheckerWrap">
        <div id="pvChecker"></div>
        <canvas id="pvCanvas" width="1920" height="1080"></canvas>
      </div>
      <div id="pvTime">0f</div>
    </div>
    <div id="pvResizer" title="ドラッグでプレビュー/タイムラインサイズ調整"></div>
    <div id="tl">
      <div id="compTabs"></div>
      <div id="tlHdr">
        <span>素材→ドラッグ配置 ／ クリップドラッグ=移動 ／ 端=トリミング ／ Shift+端=タイムリマップ ／ Shift+ドラッグ=スナップ ／ Shift+Ctrl+D=分割</span>
        <button class="btn sm" onclick="addVLayer()">+映像</button>
        <button class="btn sm" onclick="addATrack()">+音声</button>
      </div>
      <div id="tlBody">
        <div id="tlLeft">
          <div id="tlLblRuler"></div>
          <div id="tlLblRows"></div>
        </div>
        <div id="tlRight">
          <div id="tlInner">
            <div id="ruler"><canvas id="rulerCanvas"></canvas></div>
            <div id="playhead"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="props">
    <h3>プロパティ</h3>
    <div id="propsInner"><div id="noSel">クリップを選択するか<br>素材をタイムラインへ<br>ドロップしてください</div></div>
  </div>
</div>
</div>

<div class="overlay" id="loadOvl">
  <p id="loadMsg">処理中...</p>
  <div class="prog-bar"><div class="prog-fill" id="loadFill"></div></div>
  <p class="prog-sub" id="loadSub"></p>
</div>

<div id="expModal">
  <div class="exp-box">
    <h2>MP4書き出し（アクティブなコンポ）</h2>
    <div class="exp-row"><label>解像度</label><span id="expResLbl"></span></div>
    <div class="exp-row"><label>FPS</label><span id="expFpsLbl"></span></div>
    <div class="exp-row"><label>映像ビットレート</label>
      <select id="expBitrate">
        <option value="4000000">4 Mbps</option>
        <option value="8000000" selected>8 Mbps (標準)</option>
        <option value="16000000">16 Mbps</option>
        <option value="30000000">30 Mbps</option>
      </select>
    </div>
    <div class="exp-info" id="expInfo"></div>
    <div class="exp-btns">
      <button class="btn" onclick="hideExpModal()">キャンセル</button>
      <button class="btn grn" onclick="startExport()">書き出し開始</button>
    </div>
  </div>
</div>

<input type="file" id="fi-seq" multiple accept="image/*" style="display:none">
<input type="file" id="fi-vid" accept="video/*" style="display:none">
<input type="file" id="fi-aud" accept="audio/*" style="display:none">
<input type="file" id="fi-proj" accept=".json" style="display:none">

<!-- Comp creation modal -->
<div id="addCompModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:20px 22px;width:300px;">
    <div style="font-size:13px;font-weight:500;color:#eee;margin-bottom:14px;">新規コンポを作成</div>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">コンポ名</label>
      <input type="text" id="newCompName" style="width:100%;background:#111;border:1px solid #2e2e2e;color:#ddd;border-radius:4px;padding:5px 8px;font-size:12px;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">解像度</label>
      <div style="display:flex;gap:4px;align-items:center;">
        <select id="newCompResPreset" onchange="onNewCompResPreset(this.value)" style="background:#111;border:1px solid #2e2e2e;color:#ccc;border-radius:4px;padding:4px 6px;font-size:12px;">
          <option value="1920x1080">1920×1080</option>
          <option value="1280x720">1280×720</option>
          <option value="custom">カスタム</option>
        </select>
        <input type="number" id="newCompW" value="1920" min="1" max="7680" style="width:58px;background:#111;border:1px solid #2e2e2e;color:#ddd;border-radius:4px;padding:4px 5px;font-size:12px;">
        <span style="color:#555">×</span>
        <input type="number" id="newCompH" value="1080" min="1" max="4320" style="width:58px;background:#111;border:1px solid #2e2e2e;color:#ddd;border-radius:4px;padding:4px 5px;font-size:12px;">
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="g('addCompModal').style.display='none'" style="background:#1e1e1e;border:1px solid #333;border-radius:5px;padding:5px 14px;color:#aaa;cursor:pointer;font-size:12px;">キャンセル</button>
      <button onclick="confirmAddComp()" style="background:#163a5e;border:1px solid #2e6ea6;border-radius:5px;padding:5px 14px;color:#7ec8ff;cursor:pointer;font-size:12px;">作成</button>
    </div>
  </div>
</div>
<div id="solidModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:20px 22px;width:280px;">
    <div style="font-size:13px;font-weight:500;color:#eee;margin-bottom:14px;">平面を作成</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <label style="font-size:12px;color:#888;white-space:nowrap;">色を選択</label>
      <input type="color" id="solidColorPick" value="#000000" oninput="onSolidColorInput(this.value)" style="width:50px;height:30px;border:1px solid #333;background:#111;cursor:pointer;border-radius:4px;">
      <div id="solidPreview" style="flex:1;height:30px;border-radius:4px;border:1px solid #333;background:#000000;"></div>
    </div>
    <div style="margin-bottom:14px;">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">平面名</label>
      <input type="text" id="solidName" oninput="this._edited=true" style="width:100%;background:#111;border:1px solid #2e2e2e;color:#ddd;border-radius:4px;padding:5px 8px;font-size:12px;box-sizing:border-box;">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="hideSolidModal()" style="background:#1e1e1e;border:1px solid #333;border-radius:5px;padding:5px 14px;color:#aaa;cursor:pointer;font-size:12px;">キャンセル</button>
      <button onclick="confirmSolid()" style="background:#163a5e;border:1px solid #2e6ea6;border-radius:5px;padding:5px 14px;color:#7ec8ff;cursor:pointer;font-size:12px;">作成</button>
    </div>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────
var TRACK_H=44,RULER_H=24;
var CLIP_COLORS=['#1b3a68','#1a4a28','#4e1a10','#321068','#3d3c10','#0e3a3a','#4a1235','#26400e'];
var CW=1920,CH=1080;
var C=document.getElementById('pvCanvas');
var ctx=C.getContext('2d',{alpha:true});
var pvZoom='fit';
var isExporting=false;
// File System Access API: only usable in top-level window (not iframe)
var canFSA=!!(window.showOpenFilePicker&&window.self===window.top);

// ─── IndexedDB ────────────────────────────────────────────────────────────
var _db=null;
function getDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise(function(res,rej){
    var req=indexedDB.open('tlv5-handles',1);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore('h');};
    req.onsuccess=function(e){_db=e.target.result;res(_db);};
    req.onerror=function(){rej(new Error('IDB open failed'));};
  });
}
async function dbPut(k,v){try{var db=await getDB();return new Promise(function(res,rej){var tx=db.transaction('h','readwrite');tx.objectStore('h').put(v,k);tx.oncomplete=res;tx.onerror=rej;});}catch(e){console.warn('dbPut',e);}}
async function dbGet(k){try{var db=await getDB();return new Promise(function(res){var tx=db.transaction('h','readonly');var req=tx.objectStore('h').get(k);req.onsuccess=function(){res(req.result);};req.onerror=function(){res(null);};});}catch(e){return null;}}
async function dbGranted(h){try{var p=await h.queryPermission({mode:'read'});if(p==='granted')return true;p=await h.requestPermission({mode:'read'});return p==='granted';}catch(e){return false;}}

// ─── State ────────────────────────────────────────────────────────────────
var S={
  fps:24,pxPerSec:120,timeMode:'frame',
  time:0,playing:false,selId:null,
  comps:[],activeCompId:null,
  assets:[],folders:[],_nid:1,
  projId:'p'+Date.now()
};

// Active comp accessor
function AC(){return S.comps.find(function(c){return c.id===S.activeCompId;})||S.comps[0];}

// ─── Undo / Redo ──────────────────────────────────────────────────────────
var _hist=[],_histIdx=-1,MAX_HIST=60;
function snapState(){return JSON.stringify({comps:S.comps,activeCompId:S.activeCompId});}
function pushHistory(){
  _hist=_hist.slice(0,_histIdx+1);
  _hist.push(snapState());
  if(_hist.length>MAX_HIST)_hist.shift();
  _histIdx=_hist.length-1;
  updateUndoUI();
}
function undo(){if(_histIdx<=0)return;_histIdx--;applySnap(JSON.parse(_hist[_histIdx]));}
function redo(){if(_histIdx>=_hist.length-1)return;_histIdx++;applySnap(JSON.parse(_hist[_histIdx]));}
function applySnap(state){
  S.comps=state.comps; S.activeCompId=state.activeCompId;
  S.selId=null; renderCompTabs(); rebuildTl(); renderProps(); updateUndoUI();
}
function updateUndoUI(){
  var u=g('btnUndo'),r=g('btnRedo');
  if(u){u.disabled=_histIdx<=0;u.style.opacity=_histIdx<=0?'0.4':'1';}
  if(r){r.disabled=_histIdx>=_hist.length-1;r.style.opacity=_histIdx>=_hist.length-1?'0.4':'1';}
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function nid(){return S._nid++;}
function g(id){return document.getElementById(id);}
function findAsset(id){return S.assets.find(function(a){return a.id===id;});}
function findClip(id){
  var c=AC();if(!c)return null;
  return c.clips.find(function(cl){return cl.id===id;})||c.aClips.find(function(cl){return cl.id===id;});
}
function isAClip(id){var c=AC();if(!c)return false;return !!c.aClips.find(function(cl){return cl.id===id;});}
function timeToX(t){return t*S.pxPerSec;}
function xToTime(x){return x/S.pxPerSec;}
function maxSrc(a){
  if(!a)return 9999;
  if(a.type==='seq'||a.type==='img')return a.frames&&a.frames.length?a.frames.length/(a.seqFps||S.fps):9999;
  return a.duration||9999;
}
function tick(){return new Promise(function(r){setTimeout(r,0);});}
function snapToFrame(t){if(!S.fps)return t;return Math.round(t*S.fps)/S.fps;}
function setActiveDur(v){var c=AC();if(c){c.dur=+v;}rebuildTl();}

// ─── Time format ──────────────────────────────────────────────────────────
function fmtTime(t){
  var totalF=Math.round(t*S.fps);
  if(S.timeMode==='frame')return totalF+'f';
  var ff=totalF%S.fps,totalSec=Math.floor(totalF/S.fps),ss=totalSec%60,mm=Math.floor(totalSec/60);
  var ffStr=(''+ff).padStart(2,'0');
  return mm>0?mm+'分'+(''+ss).padStart(2,'0')+'秒'+ffStr+'f':ss+'秒'+ffStr+'f';
}
function toggleTimeMode(){
  S.timeMode=S.timeMode==='frame'?'sec':'frame';
  g('btnTimeMode').textContent=S.timeMode==='frame'?'F':'S';
  g('btnTimeMode').classList.toggle('act',S.timeMode==='frame');
  S.time=snapToFrame(S.time);
  rebuildTl();updateTimeDisp();
}

// ─── Resolution / PvZoom ──────────────────────────────────────────────────
function changeRes(v){var p=v.split('x');CW=+p[0];CH=+p[1];C.width=CW;C.height=CH;var c=AC();if(c){c.width=CW;c.height=CH;}setPvZoom(pvZoom);}
function onResSelect(v){
  if(v!=='custom'){
    var p=v.split('x');
    g('inResW').value=p[0]; g('inResH').value=p[1];
    changeRes(v);
  }
}
function applyCustomRes(){
  var w=parseInt(g('inResW').value)||1920;
  var h=parseInt(g('inResH').value)||1080;
  CW=w; CH=h; C.width=CW; C.height=CH;
  var c=AC();if(c){c.width=CW;c.height=CH;}
  setPvZoom(pvZoom);
  g('selRes').value='custom';
}
function setPvZoom(z){
  pvZoom=z;
  ['zFit','z25','z50','z100'].forEach(function(id){g(id).classList.remove('act');});
  if(z==='fit'){
    g('zFit').classList.add('act');
    C.style.width='';C.style.height='';C.style.maxWidth='100%';C.style.maxHeight='300px';
  } else {
    var m={0.25:'z25',0.5:'z50',1.0:'z100'};if(m[z])g(m[z]).classList.add('act');
    C.style.maxWidth='none';C.style.maxHeight='none';
    C.style.width=Math.round(CW*z)+'px';C.style.height=Math.round(CH*z)+'px';
  }
  // チェッカーをキャンバスと同サイズに同期
  var chk=g('pvChecker');
  if(chk){chk.style.width=C.style.width||'';chk.style.height=C.style.height||'';}
}
function screenToCanvas(e){var r=C.getBoundingClientRect();return{x:(e.clientX-r.left)*CW/r.width,y:(e.clientY-r.top)*CH/r.height};}
function handleRadius(){var r=C.getBoundingClientRect();return 14*CW/r.width;}

// ─── Preview / Timeline resizer ───────────────────────────────────────────
(function(){
  var resizer=document.getElementById('pvResizer');
  var pvWrap=document.getElementById('pvWrap');
  var _rDrag=false,_rStartY=0,_rStartH=0;
  resizer.addEventListener('mousedown',function(e){
    _rDrag=true;_rStartY=e.clientY;_rStartH=pvWrap.offsetHeight;
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!_rDrag)return;
    var newH=Math.max(60,Math.min(700,_rStartH+(e.clientY-_rStartY)));
    pvWrap.style.maxHeight=newH+'px';
    pvWrap.style.height=newH+'px';
    setPvZoom(pvZoom);
  });
  document.addEventListener('mouseup',function(){_rDrag=false;});
})();

// ─── Loading overlay ──────────────────────────────────────────────────────
function showLoad(msg,sub,pct){g('loadMsg').textContent=msg||'処理中...';g('loadSub').textContent=sub||'';g('loadFill').style.width=((pct||0)*100)+'%';g('loadOvl').classList.add('show');}
function setLoad(pct,msg,sub){g('loadFill').style.width=(pct*100)+'%';if(msg)g('loadMsg').textContent=msg;if(sub!==undefined)g('loadSub').textContent=sub;}
function hideLoad(){g('loadOvl').classList.remove('show');}

// ─── Import ───────────────────────────────────────────────────────────────
async function processImgItems(items,storeH){
  items=Array.from(items);
  items.sort(function(a,b){return a.name.localeCompare(b.name,undefined,{numeric:true});});
  var isSingle=items.length===1,firstName=items[0].name;
  showLoad(isSingle?'画像読み込み中...':'連番読み込み中...','0/'+items.length,0);
  var frames=[];
  for(var i=0;i<items.length;i++){
    try{var file=typeof items[i].getFile==='function'?await items[i].getFile():items[i];frames.push(await createImageBitmap(file));}catch(e){}
    if(i%8===0){setLoad((i+1)/items.length,null,(i+1)+'/'+items.length);await tick();}
  }
  hideLoad();
  if(!frames.length){alert('画像を読み込めませんでした');return;}
  var aid=nid();
  S.assets.push({id:aid,type:isSingle?'img':'seq',name:firstName,displayName:firstName,
    frames:frames,seqFps:S.fps,duration:isSingle?9999:frames.length/S.fps,frameCount:frames.length});
  if(storeH){
    await dbPut(S.projId+':'+aid+':n',items.length);
    for(var j=0;j<items.length;j++){if(typeof items[j].getFile==='function')await dbPut(S.projId+':'+aid+':'+j,items[j]);}
  }
  renderAssets();
}
async function importImgFSA(){
  if(!canFSA){g('fi-seq').click();return;}
  try{var hs=await window.showOpenFilePicker({multiple:true,startIn:'desktop',types:[{description:'画像ファイル',accept:{'image/*':[]}}]});await processImgItems(hs,true);}
  catch(e){if(e.name!=='AbortError'){console.warn(e);g('fi-seq').click();}}
}
async function importVidFSA(){
  if(!canFSA){g('fi-vid').click();return;}
  try{
    var hs=await window.showOpenFilePicker({startIn:'desktop',types:[{description:'動画ファイル',accept:{'video/*':[]}}]});
    var h=hs[0],file=await h.getFile(),url=URL.createObjectURL(file);
    var ve=document.createElement('video');ve.src=url;ve.preload='auto';
    await new Promise(function(r){ve.onloadedmetadata=r;ve.onerror=r;});
    var aid=nid();
    S.assets.push({id:aid,type:'vid',name:file.name,displayName:file.name,videoEl:ve,duration:ve.duration,srcUrl:url});
    await dbPut(S.projId+':'+aid+':n',1);await dbPut(S.projId+':'+aid+':0',h);
    renderAssets();
  }catch(e){if(e.name!=='AbortError'){console.warn(e);g('fi-vid').click();}}
}
async function importAudFSA(){
  if(!canFSA){g('fi-aud').click();return;}
  try{
    var hs=await window.showOpenFilePicker({startIn:'desktop',types:[{description:'音楽ファイル',accept:{'audio/*':[]}}]});
    var h=hs[0],file=await h.getFile(),url=URL.createObjectURL(file);
    var ae=new Audio(url);ae.preload='auto';
    await new Promise(function(r){ae.onloadedmetadata=r;ae.onerror=r;});
    var aid=nid();
    S.assets.push({id:aid,type:'aud',name:file.name,displayName:file.name,audioEl:ae,duration:ae.duration,srcUrl:url});
    await dbPut(S.projId+':'+aid+':n',1);await dbPut(S.projId+':'+aid+':0',h);
    renderAssets();
  }catch(e){if(e.name!=='AbortError'){console.warn(e);g('fi-aud').click();}}
}
g('fi-seq').onchange=async function(){var f=Array.from(this.files);if(!f.length)return;await processImgItems(f,false);this.value='';};
g('fi-vid').onchange=function(){var f=this.files[0];if(!f)return;var url=URL.createObjectURL(f);var ve=document.createElement('video');ve.src=url;ve.preload='auto';ve.onloadedmetadata=function(){S.assets.push({id:nid(),type:'vid',name:f.name,displayName:f.name,videoEl:ve,duration:ve.duration,srcUrl:url});renderAssets();};this.value='';};
g('fi-aud').onchange=function(){var f=this.files[0];if(!f)return;var url=URL.createObjectURL(f);var ae=new Audio(url);ae.preload='auto';ae.onloadedmetadata=function(){S.assets.push({id:nid(),type:'aud',name:f.name,displayName:f.name,audioEl:ae,duration:ae.duration,srcUrl:url});renderAssets();};this.value='';};

async function reimportStub(aid){
  var a=findAsset(aid);if(!a||!a.stub)return;
  var isImg=a.type==='img'||a.type==='seq';
  if(canFSA){
    try{
      var opts={multiple:isImg,startIn:'desktop',types:[{description:'ファイル',accept:isImg?{'image/*':[]}:a.type==='vid'?{'video/*':[]}:{'audio/*':[]}}]};
      var hs=await window.showOpenFilePicker(opts);
      if(isImg){
        hs.sort(function(x,y){return x.name.localeCompare(y.name,undefined,{numeric:true});});
        showLoad('再リンク中...','0/'+hs.length,0);
        var frames=[];
        for(var i=0;i<hs.length;i++){var f=await hs[i].getFile();try{frames.push(await createImageBitmap(f));}catch(e){}if(i%8===0){setLoad((i+1)/hs.length,null,(i+1)+'/'+hs.length);await tick();}}
        hideLoad();if(!frames.length)return;
        a.frames=frames;a.frameCount=frames.length;a.stub=false;
        await dbPut(S.projId+':'+aid+':n',hs.length);
        for(var i=0;i<hs.length;i++)await dbPut(S.projId+':'+aid+':'+i,hs[i]);
      } else if(a.type==='vid'){
        var h=hs[0],file=await h.getFile(),url=URL.createObjectURL(file);
        var ve=document.createElement('video');ve.src=url;ve.preload='auto';
        await new Promise(function(r){ve.onloadedmetadata=r;});
        a.videoEl=ve;a.duration=ve.duration;a.srcUrl=url;a.stub=false;
        await dbPut(S.projId+':'+aid+':n',1);await dbPut(S.projId+':'+aid+':0',hs[0]);
      } else {
        var h=hs[0],file=await h.getFile(),url=URL.createObjectURL(file);
        var ae=new Audio(url);ae.preload='auto';
        await new Promise(function(r){ae.onloadedmetadata=r;});
        a.audioEl=ae;a.duration=ae.duration;a.srcUrl=url;a.stub=false;
        await dbPut(S.projId+':'+aid+':n',1);await dbPut(S.projId+':'+aid+':0',hs[0]);
      }
      renderAssets();rebuildTl();return;
    }catch(e){if(e.name==='AbortError')return;console.warn(e);}
  }
  var fi=document.createElement('input');fi.type='file';fi.accept=isImg?'image/*':a.type==='vid'?'video/*':'audio/*';if(a.type==='seq')fi.multiple=true;
  fi.onchange=async function(){
    var files=Array.from(fi.files);if(!files.length)return;
    if(isImg){files.sort(function(x,y){return x.name.localeCompare(y.name,undefined,{numeric:true});});showLoad('再リンク中...','',0);var frames=[];for(var i=0;i<files.length;i++){try{frames.push(await createImageBitmap(files[i]));}catch(e){}if(i%8===0){setLoad((i+1)/files.length,null,(i+1)+'/'+files.length);await tick();}}hideLoad();a.frames=frames;a.frameCount=frames.length;a.stub=false;}
    else if(a.type==='vid'){var url=URL.createObjectURL(files[0]);var ve=document.createElement('video');ve.src=url;ve.preload='auto';await new Promise(function(r){ve.onloadedmetadata=r;});a.videoEl=ve;a.duration=ve.duration;a.srcUrl=url;a.stub=false;}
    else{var url=URL.createObjectURL(files[0]);var ae=new Audio(url);ae.preload='auto';await new Promise(function(r){ae.onloadedmetadata=r;});a.audioEl=ae;a.duration=ae.duration;a.srcUrl=url;a.stub=false;}
    renderAssets();rebuildTl();
  };fi.click();
}

async function tryRestoreAsset(a){
  try{
    var count=await dbGet(S.projId+':'+a.id+':n');if(!count)return false;
    var h0=await dbGet(S.projId+':'+a.id+':0');if(!h0||!await dbGranted(h0))return false;
    if(a.type==='img'||a.type==='seq'){
      var frames=[];
      for(var i=0;i<count;i++){var h=await dbGet(S.projId+':'+a.id+':'+i);if(!h)break;var f=await h.getFile();try{frames.push(await createImageBitmap(f));}catch(e){}}
      if(!frames.length)return false;a.frames=frames;a.frameCount=frames.length;a.stub=false;return true;
    } else if(a.type==='vid'){
      var f=await h0.getFile(),url=URL.createObjectURL(f);var ve=document.createElement('video');ve.src=url;ve.preload='auto';
      await new Promise(function(r){ve.onloadedmetadata=r;ve.onerror=r;});a.videoEl=ve;a.duration=ve.duration||a.duration;a.srcUrl=url;a.stub=false;return true;
    } else if(a.type==='aud'){
      var f=await h0.getFile(),url=URL.createObjectURL(f);var ae=new Audio(url);ae.preload='auto';
      await new Promise(function(r){ae.onloadedmetadata=r;ae.onerror=r;});a.audioEl=ae;a.duration=ae.duration||a.duration;a.srcUrl=url;a.stub=false;return true;
    }
  }catch(e){console.warn('restore failed',a.name,e);}
  return false;
}

// ─── Folders ──────────────────────────────────────────────────────────────
function createFolder(){var name=prompt('フォルダ名を入力してください','フォルダ'+(S.folders.length+1));if(!name)return;S.folders.push({id:nid(),name:name,open:true});renderAssets();}
function renameFolder(id){var f=S.folders.find(function(f){return f.id===id;});if(!f)return;var n=prompt('フォルダ名を変更してください',f.name);if(n&&n.trim())f.name=n.trim();renderAssets();}
function toggleFolder(id){var f=S.folders.find(function(f){return f.id===id;});if(f)f.open=!f.open;renderAssets();}
function deleteFolder(id){S.assets.forEach(function(a){if(a.folderId===id)a.folderId=null;});S.folders=S.folders.filter(function(f){return f.id!==id;});renderAssets();}
function assignToFolder(aid,fid){var a=findAsset(aid);if(a)a.folderId=fid||null;renderAssets();}

// ─── Asset panel ──────────────────────────────────────────────────────────
function renderAssets(){
  var el=g('assetList');el.innerHTML='';
  // Comps section at top
  if(S.comps.length>0){
    var sec=document.createElement('div');sec.className='a-sec';sec.textContent='コンポ';el.appendChild(sec);
    S.comps.forEach(function(comp){
      var d=document.createElement('div');d.className='a-item';d.draggable=true;
      d.ondragstart=function(e){e.dataTransfer.setData('compId',''+comp.id);};
      var badge=document.createElement('span');badge.className='badge b-comp';badge.textContent='COMP';
      var name=document.createElement('span');name.className='a-name';name.textContent=comp.name;name.title=comp.name;
      name.onclick=function(){setActiveComp(comp.id);};
      name.style.cursor='pointer';
      var ed=document.createElement('span');ed.className='folder-del';ed.textContent='✏';ed.title='名前を変更';
      ed.style.color='#556633';
      ed.onclick=function(e){e.stopPropagation();renameComp(comp.id);};
      var del=document.createElement('span');del.className='a-del';del.textContent='✕';del.title='コンポを削除';
      del.onclick=function(e){e.stopPropagation();removeComp(comp.id);};
      d.appendChild(badge);d.appendChild(name);d.appendChild(ed);
      if(S.comps.length>1)d.appendChild(del);
      d.onclick=function(e){if(!e.defaultPrevented)showCompInfo(comp.id);};
      el.appendChild(d);
    });
  }
  // Assets (ungrouped)
  var hasAssets=S.assets.some(function(a){return !a.folderId;});
  if(hasAssets){
    var sec2=document.createElement('div');sec2.className='a-sec';sec2.textContent='素材';el.appendChild(sec2);
    S.assets.filter(function(a){return !a.folderId;}).forEach(function(a){el.appendChild(makeAssetEl(a));});
  }
  // Folders: parentFolderIdを持つものは入れ子で表示、持たないものがルートレベル
  function renderFolderEl(folder, depth) {
    var indent = depth * 10;
    var fhdr=document.createElement('div');fhdr.className='folder-hdr';
    fhdr.style.paddingLeft=(5+indent)+'px';
    fhdr.ondragover=function(e){e.preventDefault();fhdr.classList.add('drop-hi');};
    fhdr.ondragleave=function(){fhdr.classList.remove('drop-hi');};
    fhdr.ondrop=function(e){e.preventDefault();fhdr.classList.remove('drop-hi');var aid=parseInt(e.dataTransfer.getData('panel-aid'),10);if(aid)assignToFolder(aid,folder.id);};
    fhdr.innerHTML='<span class="folder-toggle">'+(folder.open?'▼':'▶')+'</span>'
      +'<span class="folder-name">'+folder.name+'</span>'
      +'<span class="folder-del" onclick="event.stopPropagation();renameFolder('+folder.id+')" title="名前変更" style="color:#556633">✏</span>'
      +'<span class="folder-del" onclick="event.stopPropagation();deleteFolder('+folder.id+')" title="フォルダ削除">✕</span>';
    fhdr.querySelector('.folder-toggle').onclick=fhdr.querySelector('.folder-name').onclick=function(e){e.stopPropagation();toggleFolder(folder.id);};
    el.appendChild(fhdr);
    if(folder.open){
      var fc=document.createElement('div');fc.className='folder-contents';
      // このフォルダ直下の素材
      S.assets.filter(function(a){return a.folderId===folder.id;}).forEach(function(a){fc.appendChild(makeAssetEl(a));});
      el.appendChild(fc);
      // 子フォルダを再帰表示
      S.folders.filter(function(f){return f.parentFolderId===folder.id;}).forEach(function(child){
        renderFolderEl(child, depth+1);
      });
    }
  }
  // ルートフォルダ（parentFolderIdがないもの）だけを最上位に表示
  S.folders.filter(function(f){return !f.parentFolderId;}).forEach(function(folder){
    renderFolderEl(folder, 0);
  });
}

function makeAssetEl(a){
  var d=document.createElement('div');d.className='a-item'+(a.stub?' stub-item':'');
  var bc=a.stub?'b-miss':a.type==='seq'?'b-seq':a.type==='img'?'b-img':a.type==='vid'?'b-vid':a.type==='solid'?'b-solid':'b-aud';
  var bt=a.stub?'??':a.type==='seq'?'SEQ':a.type==='img'?'IMG':a.type==='vid'?'MP4':a.type==='solid'?'SOLID':'AUDIO';
  var dname=a.displayName||a.name;
  var dispName=a.type==='seq'&&dname.length>16?dname.substring(0,12)+'...'+dname.split('.').pop():dname;
  d.draggable=!a.stub;
  d.ondragstart=function(e){e.dataTransfer.setData('aid',''+a.id);e.dataTransfer.setData('panel-aid',''+a.id);};
  d.onclick=function(e){if(!e.defaultPrevented)showAssetInfo(a.id);};
  var badge=document.createElement('span');badge.className='badge '+bc;badge.textContent=bt;
  var name=document.createElement('span');name.className='a-name';name.textContent=dispName;name.title=dname;
  var del=document.createElement('span');del.className='a-del';del.textContent='✕';del.title='削除';
  del.onclick=function(e){e.stopPropagation();deleteAsset(a.id);};
  d.appendChild(badge);
  // 平面はカラースウォッチを表示
  if(a.type==='solid'&&a.color){
    var sw=document.createElement('span');
    sw.style.cssText='display:inline-block;width:11px;height:11px;border-radius:2px;border:1px solid #444;flex-shrink:0;background:'+a.color+';';
    d.appendChild(sw);
  }
  if(a.stub){var ri=document.createElement('span');ri.className='stub-reimport';ri.textContent='リンク';ri.title='元ファイル名: '+a.originalName;ri.onclick=function(){reimportStub(a.id);};d.appendChild(ri);}
  d.appendChild(name);d.appendChild(del);
  return d;
}

function deleteAsset(aid){
  var c=AC();
  if(c){var wasSel=c.clips.concat(c.aClips).some(function(cl){return cl.assetId===aid&&cl.id===S.selId;});if(wasSel){S.selId=null;renderProps();}c.clips=c.clips.filter(function(cl){return cl.assetId!==aid;});c.aClips=c.aClips.filter(function(cl){return cl.assetId!==aid;});}
  S.assets=S.assets.filter(function(a){return a.id!==aid;});
  renderAssets();rebuildTl();
}

// ─── Asset / Comp info in props panel ────────────────────────────────────
function infoRow(label,val){
  return '<div class="pr"><div class="pl" style="justify-content:space-between"><span style="color:#666">'+label+'</span><span style="color:#aaa;font-family:monospace;font-size:11px">'+val+'</span></div></div>';
}
function showAssetInfo(aid){
  S.selId=null; // クリップ選択は外す
  var a=findAsset(aid);if(!a)return;
  var pi=g('propsInner');
  var html='<div class="ps">素材情報</div>';
  html+=infoRow('名前',a.displayName||a.name);
  html+=infoRow('種類',a.type==='seq'?'連番画像':a.type==='img'?'静止画':a.type==='vid'?'動画':a.type==='solid'?'平面':'音声');

  if(a.type==='seq'){
    var firstName=a.name;
    // 連番の最初と最後のフレーム番号を推定
    var match=firstName.match(/(\d+)(\.[^.]+)$/);
    if(match){
      var startNum=parseInt(match[1],10);
      var digits=match[1].length;
      var endNum=startNum+(a.frameCount||0)-1;
      var pad=function(n){var s=''+n;while(s.length<digits)s='0'+s;return s;};
      html+=infoRow('開始フレーム',pad(startNum));
      html+=infoRow('終了フレーム',pad(endNum));
      html+=infoRow('フレーム数',(a.frameCount||0)+'f');
    }
    html+=infoRow('シーケンスFPS',(a.seqFps||S.fps)+' fps');
    html+=infoRow('尺',fmtTime(a.duration||0));
    if(a.frames&&a.frames.length){html+=infoRow('サイズ',a.frames[0].width+'×'+a.frames[0].height);}
  } else if(a.type==='img'){
    if(a.frames&&a.frames.length){html+=infoRow('サイズ',a.frames[0].width+'×'+a.frames[0].height);}
  } else if(a.type==='vid'){
    if(a.videoEl){html+=infoRow('サイズ',a.videoEl.videoWidth+'×'+a.videoEl.videoHeight);}
    html+=infoRow('尺',fmtTime(a.duration||0));
  } else if(a.type==='solid'){
    html+=infoRow('サイズ',CW+'×'+CH);
    html+=infoRow('色',a.color||'#000000');
    if(a.color){html+='<div class="pr"><div style="width:100%;height:18px;border-radius:3px;border:1px solid #333;background:'+(a.color)+'"></div></div>';}
  } else if(a.type==='aud'){
    html+=infoRow('尺',fmtTime(a.duration||0));
  }
  if(a.stub){html+='<p style="font-size:11px;color:#c08030;margin-top:8px">⚠ リンク切れ</p>';}
  pi.innerHTML=html;
}

function showCompInfo(cid){
  S.selId=null;
  var comp=S.comps.find(function(c){return c.id===cid;});if(!comp)return;
  var pi=g('propsInner');
  var cw=comp.width||CW, ch=comp.height||CH;
  var html='<div class="ps">コンポ情報</div>';
  html+=infoRow('名前',comp.name);
  html+=infoRow('サイズ',cw+'×'+ch);
  html+=infoRow('FPS',S.fps+' fps');
  html+=infoRow('尺',fmtTime(comp.dur));
  html+=infoRow('映像レイヤー',comp.vLayers.length+'');
  html+=infoRow('音声トラック',comp.aTracks.length+'');
  html+=infoRow('映像クリップ',comp.clips.length+'');
  html+=infoRow('音声クリップ',comp.aClips.length+'');
  html+='<div class="ps">サイズ変更</div>'
    +'<div style="display:flex;gap:4px;align-items:center;margin-bottom:6px;">'
    +'<input type="number" id="pCW" value="'+cw+'" min="1" max="7680" style="width:60px;background:#111;border:1px solid #2e2e2e;color:#ddd;border-radius:4px;padding:3px 5px;font-size:12px;">'
    +'<span style="color:#555;font-size:11px">×</span>'
    +'<input type="number" id="pCH" value="'+ch+'" min="1" max="4320" style="width:60px;background:#111;border:1px solid #2e2e2e;color:#ddd;border-radius:4px;padding:3px 5px;font-size:12px;">'
    +'<button class="btn sm" onclick="applyCompSize('+cid+')">適用</button>'
    +'</div>';
  html+='<button class="btn sm" style="margin-top:4px" onclick="setActiveComp('+cid+')">このコンポを開く</button>';
  pi.innerHTML=html;
}
function applyCompSize(cid){
  var comp=S.comps.find(function(c){return c.id===cid;});if(!comp)return;
  var w=parseInt(g('pCW').value)||comp.width||CW;
  var h=parseInt(g('pCH').value)||comp.height||CH;
  comp.width=w; comp.height=h;
  // アクティブなコンポなら即座に反映
  if(S.activeCompId===cid){
    CW=w; CH=h; C.width=CW; C.height=CH;
    var knownRes=['1920x1080','1280x720'];
    var rs=CW+'x'+CH;
    g('selRes').value=knownRes.indexOf(rs)>=0?rs:'custom';
    g('inResW').value=CW; g('inResH').value=CH;
    setPvZoom(pvZoom);
  }
  // offscreenキャンバスを再生成
  delete _compCanvases[cid];
  pushHistory();
  showCompInfo(cid);
  rebuildTl();
}

  });
}
function hexToSolidName(hex){
  var names={'#000000':'ブラック','#ffffff':'ホワイト','#ff0000':'レッド',
    '#00ff00':'グリーン','#0000ff':'ブルー','#ffff00':'イエロー',
    '#ff00ff':'マゼンタ','#00ffff':'シアン','#808080':'グレー'};
  return (names[hex.toLowerCase()]||'カスタム');
}

    vLayers:[{id:nid(),name:'V2'},{id:nid(),name:'V1'}],

function addComp(){
  var n=g('newCompName');
  n.value='Comp'+(S.comps.length+1);

  g('newCompW').value=CW; g('newCompH').value=CH;

function onNewCompResPreset(v){

function confirmAddComp(){
  var name=g('newCompName').value.trim();
  if(!name)return;
